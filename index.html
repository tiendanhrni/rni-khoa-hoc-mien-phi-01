// ── Helpers ───────────────────────────────────────────────────────────────────
const ALL_LESSONS = MODULES.flatMap(m => m.lessons.map(l => ({...l, moduleId:m.id})));

function getLessonIndex(lessonId) { return ALL_LESSONS.findIndex(l => l.id === lessonId); }
function isLessonUnlocked(lessonId, progress) {
  const idx = getLessonIndex(lessonId);
  if (idx === 0) return true;
  return !!progress[ALL_LESSONS[idx-1].id];
}

// ── UI COMPONENTS ─────────────────────────────────────────────────────────────
function Logo({className=''}) {
  return LOGO_SRC
    ? <img src={LOGO_SRC} alt="RNI Institute" className={className} />
    : <span className={`font-display font-bold text-white ${className}`}>RNI</span>;
}

function ProgressBar({value,max,className=''}) {
  const pct = Math.round((value/max)*100);
  return (
    <div className={`w-full bg-rni-100 rounded-full h-2 ${className}`}>
      <div className="progress-bar bg-gradient-to-r from-rni-600 to-gold-500 h-2 rounded-full" style={{width:`${pct}%`}}/>
    </div>
  );
}

function Btn({children,onClick,variant='primary',size='md',disabled=false,className=''}) {
  const base='inline-flex items-center justify-center font-semibold rounded-xl transition-all focus:outline-none active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed';
  const V={
    primary:'bg-rni-600 text-white hover:bg-rni-700 shadow-md hover:shadow-lg',
    secondary:'bg-white text-rni-600 border-2 border-rni-200 hover:border-rni-400',
    gold:'bg-gradient-to-r from-gold-500 to-gold-400 text-white shadow-md hover:shadow-lg',
    ghost:'text-rni-600 hover:bg-rni-50',
    outline:'border-2 border-rni-600 text-rni-600 hover:bg-rni-50'
  };
  const S={sm:'px-4 py-2 text-xs',md:'px-5 py-2.5 text-sm',lg:'px-8 py-3.5 text-base'};
  return <button onClick={onClick} disabled={disabled} className={`${base} ${V[variant]} ${S[size]} ${className}`}>{children}</button>;
}

// ── LESSON VIEW (Video + Tabs: Trắc nghiệm | Thực hành) ──────────────────────
function LessonView({lesson, progress, onComplete, onBack}) {
  const [tab, setTab] = useState('video');
  const [qIdx, setQIdx]   = useState(0);
  const [sel, setSel]     = useState(null);
  const [shown, setShown] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [quizDone, setQuizDone] = useState(false);
  const alreadyDone = !!progress[lesson.id];

  const q = lesson.quiz[qIdx];

  const pick = (i) => {
    if(shown) return;
    setSel(i);
    setShown(true);
    if(i===q.correct) setCorrect(c=>c+1);
  };

  const nextQ = () => {
    setShown(false); setSel(null);
    if(qIdx < lesson.quiz.length-1) { setQIdx(qIdx+1); }
    else {
      setQuizDone(true);
      const score = Math.round(((correct+(sel===q.correct?1:0))/lesson.quiz.length)*100);
      if(score>=50 && !alreadyDone) onComplete(lesson.id);
    }
  };

  const finalScore = lesson.quiz.length>0 ? Math.round(((correct)/lesson.quiz.length)*100) : 100;
  const passed = finalScore>=50;

  const resetQuiz = () => {
    setQIdx(0); setSel(null); setShown(false); setCorrect(0); setQuizDone(false);
  };

  return (
    <div className="min-h-screen hero-bg">
      <div className="bg-white border-b border-rni-100 sticky top-0 z-20 no-print">
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
          <button onClick={onBack} className="text-rni-600 hover:text-rni-700 transition-colors p-1 rounded-lg hover:bg-rni-50">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
          </button>
          <div className="flex-1 min-w-0">
            <p className="text-xs text-rni-600 font-semibold truncate">{lesson.title}</p>
          </div>
          {alreadyDone && <span className="text-xs bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-semibold flex-shrink-0">✅ Hoàn thành</span>}
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-4 py-6 fade-in">
        {/* Tabs */}
        <div className="flex border-b border-gray-200 mb-5">
          {[['video','📽 Video'],['quiz','📝 Trắc nghiệm'],['practice','🌱 Thực hành']].map(([k,label])=>(
            <button key={k} onClick={()=>setTab(k)}
              className={`px-5 py-3 text-sm font-semibold transition-all ${tab===k?'tab-active':'tab-inactive hover:text-gray-600'}`}>
              {label}
            </button>
          ))}
        </div>

        {/* VIDEO TAB */}
        {tab==='video' && (
          <div className="fade-in">
            {lesson.videoId ? (
              <div className="video-wrap shadow-lg mb-4">
                <iframe src={`https://www.youtube.com/embed/${lesson.videoId}`}
                  title={lesson.title} allowFullScreen
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"/>
              </div>
            ) : lesson.videoUrl ? (
              <div className="bg-rni-50 border-2 border-rni-200 rounded-2xl p-8 text-center mb-4">
                <div className="text-4xl mb-3">🎬</div>
                <h3 className="font-bold text-gray-800 mb-2">{lesson.title}</h3>
                <p className="text-gray-500 text-sm mb-5">Video này được lưu trữ trên trang web RNI Institute.</p>
                <a href={lesson.videoUrl} target="_blank" rel="noopener">
                  <Btn variant="primary" size="lg">Xem Video →</Btn>
                </a>
              </div>
            ) : (
              <div className="bg-gray-100 rounded-2xl p-8 text-center mb-4">
                <div className="text-4xl mb-3">⏳</div>
                <p className="text-gray-500">Video sẽ được cập nhật sớm.</p>
              </div>
            )}
            <div className="flex justify-end mt-4">
              <Btn onClick={()=>setTab('quiz')}>Làm bài trắc nghiệm →</Btn>
            </div>
          </div>
        )}

        {/* QUIZ TAB */}
        {tab==='quiz' && (
          <div className="fade-in">
            {!quizDone ? (
              <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
                <div className="flex items-center justify-between mb-4">
                  <span className="text-xs font-semibold text-rni-600 bg-rni-50 px-3 py-1 rounded-full">
                    Câu {qIdx+1} / {lesson.quiz.length}
                  </span>
                  <span className="text-xs text-gray-400">Đúng ≥ 50% để mở khoá bài tiếp</span>
                </div>
                <ProgressBar value={qIdx} max={lesson.quiz.length} className="mb-5"/>
                <h4 className="font-semibold text-base text-gray-800 mb-4 leading-relaxed">{q.q}</h4>
                <div className="space-y-3">
                  {q.opts.map((opt,i)=>(
                    <button key={i} onClick={()=>pick(i)}
                      className={`w-full text-left p-4 rounded-xl border-2 text-sm transition-all ${
                        shown
                          ? i===q.correct ? 'border-green-400 bg-green-50 font-medium'
                          : i===sel ? 'border-red-400 bg-red-50'
                          : 'border-gray-200 opacity-50'
                          : 'border-gray-200 hover:border-rni-300 hover:bg-rni-50 cursor-pointer'
                      }`}>
                      <span className={`inline-flex w-6 h-6 rounded-full border-2 mr-3 items-center justify-center text-xs font-bold flex-shrink-0 ${
                        shown
                          ? i===q.correct ? 'border-green-500 bg-green-500 text-white'
                          : i===sel ? 'border-red-500 bg-red-500 text-white'
                          : 'border-gray-300 text-gray-400'
                          : 'border-gray-300 text-gray-500'
                      }`}>{String.fromCharCode(65+i)}</span>
                      {opt}
                    </button>
                  ))}
                </div>
                {shown && (
                  <div className="mt-4 space-y-3 fade-in">
                    <div className={`rounded-xl p-3 text-sm font-medium ${sel===q.correct?'bg-green-50 text-green-700 border border-green-200':'bg-amber-50 text-amber-700 border border-amber-200'}`}>
                      {sel===q.correct ? '✅ Chính xác!' : `❌ Đáp án đúng: ${q.opts[q.correct]}`}
                    </div>
                    <Btn onClick={nextQ} className="w-full">
                      {qIdx<lesson.quiz.length-1 ? 'Câu tiếp theo →' : 'Xem kết quả'}
                    </Btn>
                  </div>
                )}
              </div>
            ) : (
              <div className="text-center fade-in">
                <div className={`w-24 h-24 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold font-display shadow-lg ${passed?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>
                  {finalScore}%
                </div>
                <h3 className="font-display text-2xl font-bold mb-2">{passed?'Xuất sắc! 🌸':'Thử lại nhé 🔄'}</h3>
                <p className="text-gray-500 text-sm mb-6">
                  {passed ? 'Bạn đã vượt qua bài kiểm tra. Tiếp tục phần thực hành!' : 'Bạn cần đúng ≥ 50%. Xem lại video rồi thử lại nhé.'}
                </p>
                <div className="flex gap-3 justify-center flex-wrap">
                  {passed && <Btn onClick={()=>setTab('practice')}>Đến phần Thực hành 🌱</Btn>}
                  <Btn variant="secondary" onClick={resetQuiz}>🔄 Làm lại</Btn>
                  {!passed && <Btn variant="ghost" onClick={()=>setTab('video')}>Xem lại video</Btn>}
                </div>
              </div>
            )}
          </div>
        )}

        {/* PRACTICE TAB */}
        {tab==='practice' && (
          <div className="fade-in">
            <div className="bg-gradient-to-br from-rni-50 to-amber-50 border border-rni-100 rounded-2xl p-6 mb-5">
              <h3 className="font-display text-xl font-bold text-rni-600 mb-3">🌱 Hướng dẫn thực hành</h3>
              <p className="text-gray-700 leading-relaxed text-sm whitespace-pre-line">{lesson.practice}</p>
            </div>
            {(alreadyDone || passed) && (
              <div className="text-center bounce-in">
                <div className="inline-block bg-green-50 border border-green-200 rounded-2xl px-6 py-4 mb-4">
                  <div className="text-3xl mb-1">✅</div>
                  <p className="text-green-700 font-semibold text-sm">Bài học này đã hoàn thành!</p>
                </div>
                <div className="block">
                  <Btn onClick={onBack}>← Quay lại danh sách bài học</Btn>
                </div>
              </div>
            )}
            {!alreadyDone && !passed && (
              <p className="text-center text-sm text-gray-400">Hoàn thành bài trắc nghiệm (≥ 50%) để mở khoá bài tiếp theo.</p>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [screen,  setScreen]  = useState('register');
  const [userName,setUserName]= useState('');
  const [lesson,  setLesson]  = useState(null);
  const [progress,setProgress]= useState(()=>{
    try{return JSON.parse(localStorage.getItem('rni-kvtt-progress')||'{}');}catch{return{};}
  });

  useEffect(()=>{localStorage.setItem('rni-kvtt-progress',JSON.stringify(progress));},[progress]);

  useEffect(()=>{
    const n=localStorage.getItem('rni-kvtt-name');
    if(n){setUserName(n);setScreen('dashboard');}
  },[]);

  const done = (id) => setProgress(p=>({...p,[id]:true}));

  if(screen==='register') return <RegisterScreen onDone={(n,e)=>{setUserName(n);localStorage.setItem('rni-kvtt-name',n);localStorage.setItem('rni-kvtt-email',e);setScreen('dashboard');}}/>;
  if(screen==='cert')     return <CertScreen userName={userName} onBack={()=>setScreen('dashboard')}/>;
  if(screen==='lesson' && lesson) return <LessonView lesson={lesson} progress={progress} onComplete={done} onBack={()=>{setLesson(null);setScreen('dashboard');}}/>;

  return <Dashboard userName={userName} progress={progress}
    onLesson={l=>{setLesson(l);setScreen('lesson');}}
    onCert={()=>setScreen('cert')}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
