function ExerciseIdentifySystem({ exercise, level, onComplete }) {
  const [placements, setPlacements] = useState({});
  const [dragItem, setDragItem] = useState(null);
  const [showResults, setShowResults] = useState(false);

  const unplaced = exercise.items.filter(i => !placements[i.id]);
  const linearItems = exercise.items.filter(i => placements[i.id] === 'linear');
  const systemsItems = exercise.items.filter(i => placements[i.id] === 'systems');

  const handleDragStart = (id) => setDragItem(id);
  const handleDrop = (category) => {
    if (dragItem) {
      setPlacements(prev => ({ ...prev, [dragItem]: category }));
      setDragItem(null);
    }
  };
  const handleRemove = (id) => {
    setPlacements(prev => { const n = {...prev}; delete n[id]; return n; });
  };

  const allPlaced = Object.keys(placements).length === exercise.items.length;
  const score = exercise.items.filter(i => placements[i.id] === i.answer).length;

  const checkAnswers = () => {
    setShowResults(true);
    const pct = score === exercise.items.length ? 100 : Math.round((score / exercise.items.length) * 100);
    onComplete(pct);
    setTimeout(() => { if (pct >= 60) SoundManager.playComplete(); else SoundManager.playWrong(); }, 200);
  };

  const renderCard = (item, removable = false) => (
    <div key={item.id}
      draggable={!showResults}
      onDragStart={() => handleDragStart(item.id)}
      className={`p-3 rounded-lg text-sm cursor-grab active:cursor-grabbing border transition-all ${
        showResults
          ? placements[item.id] === item.answer
            ? 'border-green-300 bg-green-50'
            : 'border-red-300 bg-red-50'
          : 'border-gray-200 bg-white hover:border-brand-300 hover:shadow-sm'
      }`}>
      <div className="flex items-start justify-between gap-2">
        <span>{item.text}</span>
        {removable && !showResults && (
          <button onClick={() => handleRemove(item.id)} className="text-gray-400 hover:text-red-500 flex-shrink-0">&times;</button>
        )}
      </div>
      {showResults && placements[item.id] !== item.answer && (
        <div className="mt-2 text-xs text-red-600 font-medium">{ui().shouldBe} {item.answer === 'systems' ? ui().systemsThinking : ui().linearThinking}</div>
      )}
    </div>
  );

  return (
    <div className="space-y-6 fade-in">
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
        <strong>{ui().tip}</strong> {ui().dragTip}
      </div>
      {unplaced.length > 0 && (
        <div className="space-y-2">
          <h4 className="font-semibold text-gray-500 text-sm uppercase tracking-wide">{ui().scenariosClassify}</h4>
          <div className="grid gap-2">{unplaced.map(i => renderCard(i))}</div>
        </div>
      )}
      <div className="grid md:grid-cols-2 gap-4">
        {[{ key: 'linear', label: ui().linearThinking, emoji: '📏', items: linearItems, color: 'orange' },
          { key: 'systems', label: ui().systemsThinking, emoji: '🔄', items: systemsItems, color: 'blue' }].map(cat => (
          <div key={cat.key}
            onDragOver={e => e.preventDefault()}
            onDragEnter={e => e.currentTarget.classList.add('drag-over')}
            onDragLeave={e => e.currentTarget.classList.remove('drag-over')}
            onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); handleDrop(cat.key); }}
            onClick={() => { if (dragItem) handleDrop(cat.key); }}
            className={`min-h-[150px] rounded-xl border-2 border-dashed p-4 transition-colors ${
              cat.color === 'orange' ? 'border-orange-300 bg-orange-50/50' : 'border-blue-300 bg-blue-50/50'
            }`}>
            <h4 className="font-semibold mb-3 flex items-center gap-2">{cat.emoji} {cat.label}</h4>
            <div className="space-y-2">{cat.items.map(i => renderCard(i, true))}</div>
            {cat.items.length === 0 && <p className="text-gray-400 text-sm italic">{ui().dragHere}</p>}
          </div>
        ))}
      </div>
      {!showResults && (
        <Button onClick={checkAnswers} disabled={!allPlaced} size="lg" className="w-full">
          {allPlaced ? ui().checkAnswers : `${ui().placeRemaining} ${exercise.items.length - Object.keys(placements).length} ${ui().remaining}`}
        </Button>
      )}
      {showResults && (
        <div className={`rounded-xl p-5 text-center ${score === exercise.items.length ? 'bg-green-50 border border-green-200' : 'bg-blue-50 border border-blue-200'}`}>
          {score === exercise.items.length && <div className="bounce-in mb-2"><CelebrationSVG className="mx-auto w-16 h-16"/></div>}
          <div className="text-2xl font-bold mb-1">{score}/{exercise.items.length} {ui().correct}</div>
          <p className="text-sm text-gray-600">{score === exercise.items.length ? ui().perfectScore : ui().reviewHint}</p>
        </div>
      )}
    </div>
  );
}

function ExerciseBuildLoop({ exercise, onComplete }) {
  const [currentScenario, setCurrentScenario] = useState(0);
  const [selectedOrder, setSelectedOrder] = useState([]);
  const [selectedType, setSelectedType] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [shuffledIndices] = useState(() => {
    return exercise.scenarios.map(s => {
      const indices = s.elements.map((_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [indices[i], indices[j]] = [indices[j], indices[i]]; }
      return indices;
    });
  });

  const scenario = exercise.scenarios[currentScenario];
  const availableIndices = shuffledIndices[currentScenario].filter(i => !selectedOrder.includes(i));

  const addToOrder = (idx) => { if (!showResult) setSelectedOrder(prev => [...prev, idx]); };
  const removeFromOrder = (idx) => { if (!showResult) setSelectedOrder(prev => prev.filter(i => i !== idx)); };

  const checkAnswer = () => {
    setShowResult(true);
    const orderCorrect = JSON.stringify(selectedOrder) === JSON.stringify(scenario.correctOrder);
    const typeCorrect = selectedType === scenario.loopType;
    const score = (orderCorrect ? 50 : 0) + (typeCorrect ? 50 : 0);
    onComplete(score);
    setTimeout(() => { if (score >= 60) SoundManager.playComplete(); else SoundManager.playWrong(); }, 200);
  };

  return (
    <div className="space-y-6 fade-in">
      <div className="bg-brand-50 border border-brand-200 rounded-xl p-4 text-sm text-brand-800 font-semibold">
        {ui().scenarioLabel} {scenario.name}
      </div>
      <div>
        <h5 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">{ui().elementsProvided}</h5>
        <div className="flex flex-wrap gap-2">
          {availableIndices.map(idx => (
              <button key={idx} onClick={() => addToOrder(idx)}
                className="px-4 py-2 rounded-lg bg-white border border-gray-200 hover:border-brand-400 hover:bg-brand-50 text-sm transition-all">
                {scenario.elements[idx]}
              </button>
          ))}
        </div>
      </div>
      <div>
        <h5 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">{ui().yourLoopOrder}</h5>
        <div className="min-h-[60px] rounded-xl border-2 border-dashed border-gray-300 p-3 flex flex-wrap items-center gap-2">
          {selectedOrder.length === 0 && <span className="text-gray-400 text-sm italic">{ui().clickToBuild}</span>}
          {selectedOrder.map((idx, pos) => (
            <div key={pos} className="flex items-center gap-1">
              <button onClick={() => removeFromOrder(idx)}
                className="px-3 py-1.5 rounded-lg bg-brand-100 text-brand-700 text-sm font-medium hover:bg-red-100 hover:text-red-700 transition-colors">
                {scenario.elements[idx]}
              </button>
              {pos < selectedOrder.length - 1 && <span className="text-gray-400 text-lg">&rarr;</span>}
            </div>
          ))}
          {selectedOrder.length === scenario.elements.length && <span className="text-gray-400 text-lg">{ui().loopsBack}</span>}
        </div>
      </div>
      {selectedOrder.length === scenario.elements.length && (
        <div>
          <h5 className="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-2">{ui().loopType}</h5>
          <div className="flex gap-3">
            {[{ key: 'reinforcing', label: ui().reinforcing, icon: '🔄' }, { key: 'balancing', label: ui().balancing, icon: '⚖️' }].map(lt => (
              <button key={lt.key} onClick={() => !showResult && setSelectedType(lt.key)}
                className={`flex-1 p-4 rounded-xl border-2 text-center transition-all ${
                  selectedType === lt.key ? 'border-brand-500 bg-brand-50' : 'border-gray-200 hover:border-gray-300'
                }`}>
                <div className="text-2xl mb-1">{lt.icon}</div>
                <div className="font-semibold text-sm">{lt.label}</div>
              </button>
            ))}
          </div>
        </div>
      )}
      {!showResult && (
        <Button onClick={checkAnswer} disabled={selectedOrder.length < scenario.elements.length || !selectedType} size="lg" className="w-full">
          {ui().checkAnswers}
        </Button>
      )}
      {showResult && (
        <div className="rounded-xl border bg-blue-50 border-blue-200 p-5">
          <div className="font-bold text-lg mb-2">{selectedType === scenario.loopType ? ui().correctLoopType : ui().wrongLoopType}</div>
          <p className="text-sm text-gray-700">{scenario.explanation}</p>
        </div>
      )}
    </div>
  );
}

function ExerciseIceberg({ exercise, onComplete }) {
  const _t = ui();
  const isEn = currentLang === 'en';
  const levels = [
    { key: 'event', label: isEn ? 'Events' : 'Sự kiện (Events)', desc: isEn ? 'What happened?' : 'Chuyện gì đã xảy ra?', color: 'bg-blue-100 border-blue-300', icon: '👁️' },
    { key: 'pattern', label: isEn ? 'Patterns' : 'Xu hướng (Patterns)', desc: isEn ? 'What keeps repeating?' : 'Xu hướng nào lặp lại?', color: 'bg-cyan-100 border-cyan-300', icon: '📈' },
    { key: 'structure', label: isEn ? 'Structure' : 'Cấu trúc (Structure)', desc: isEn ? 'What causes the pattern?' : 'Điều gì gây ra xu hướng?', color: 'bg-indigo-100 border-indigo-300', icon: '🏗️' },
    { key: 'mental-model', label: isEn ? 'Mental Models' : 'Mô hình tư duy (Mental Model)', desc: isEn ? 'What assumptions persist?' : 'Giả định nào còn tồn tại?', color: 'bg-purple-100 border-purple-300', icon: '🧠' },
  ];
  const [placements, setPlacements] = useState({});
  const [activeItem, setActiveItem] = useState(null);
  const [showResults, setShowResults] = useState(false);

  const unplaced = exercise.items.filter(i => !placements[i.id]);
  const score = exercise.items.filter(i => placements[i.id] === i.answer).length;

  const placeItem = (levelKey) => {
    if (activeItem) { setPlacements(prev => ({ ...prev, [activeItem]: levelKey })); setActiveItem(null); }
  };

  const removeItem = (id) => {
    setPlacements(prev => { const n = {...prev}; delete n[id]; return n; });
  };

  const check = () => {
    setShowResults(true);
    const pct = Math.round((score / exercise.items.length) * 100);
    onComplete(pct);
    setTimeout(() => { if (pct >= 60) SoundManager.playComplete(); else SoundManager.playWrong(); }, 200);
  };

  return (
    <div className="space-y-5 fade-in">
      {/* Each unplaced item shows with inline level selector buttons */}
      {!showResults && unplaced.length > 0 && (
        <div className="space-y-3">
          <h4 className="font-semibold text-gray-500 text-sm uppercase tracking-wide">{ui().statementsClassify}</h4>
          {unplaced.map(item => (
            <div key={item.id} className={`rounded-xl border-2 p-4 transition-all ${activeItem === item.id ? 'border-brand-400 bg-brand-50/50 shadow-md' : 'border-gray-200 bg-white'}`}>
              <p className="text-sm font-medium text-gray-800 mb-3">"{item.text}"</p>
              <div className="flex flex-wrap gap-2">
                {levels.map(lv => (
                  <button key={lv.key} onClick={() => { setActiveItem(item.id); setPlacements(prev => ({ ...prev, [item.id]: lv.key })); setActiveItem(null); }}
                    className={`px-3 py-1.5 rounded-lg text-xs font-semibold border transition-all ${lv.color} hover:scale-105 hover:shadow-sm`}>
                    {lv.icon} {lv.label.split(' (')[0]}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Show placed items grouped by level */}
      {(Object.keys(placements).length > 0 || showResults) && (
        <div className="space-y-3">
          <div className="text-center text-xs text-gray-400 mb-1">{ui().aboveWater}</div>
          {levels.map((level, li) => {
            const items = exercise.items.filter(i => placements[i.id] === level.key);
            if (items.length === 0 && !showResults) return null;
            return (
              <div key={level.key}>
                {li === 2 && <div className="text-center text-xs text-gray-400 my-1">{ui().waterline}</div>}
                <div className={`rounded-xl border-2 border-dashed p-3 min-h-[44px] ${level.color} transition-all`}>
                  <div className="flex items-center gap-2 mb-1">
                    <span>{level.icon}</span>
                    <span className="font-semibold text-sm">{level.label}</span>
                    <span className="text-xs text-gray-500">— {level.desc}</span>
                  </div>
                  <div className="space-y-1">
                    {items.map(item => (
                      <div key={item.id} className={`px-3 py-2 rounded-md text-sm ${showResults ? (placements[item.id] === item.answer ? 'bg-green-100 border border-green-300' : 'bg-red-100 border border-red-300') : 'bg-white/70 border border-gray-200'}`}>
                        <div className="flex items-start justify-between gap-2">
                          <span>{item.text}</span>
                          {!showResults && <button onClick={() => removeItem(item.id)} className="text-gray-400 hover:text-red-500 flex-shrink-0">&times;</button>}
                        </div>
                        {showResults && placements[item.id] !== item.answer && (
                          <div className="text-xs text-red-600 mt-1">{ui().belongsIn} {levels.find(l => l.key === item.answer)?.label}</div>
                        )}
                      </div>
                    ))}
                    {items.length === 0 && <p className="text-xs text-gray-400 italic">{ui().noStatements}</p>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {!showResults && (
        <Button onClick={check} disabled={Object.keys(placements).length < exercise.items.length} size="lg" className="w-full">
          {Object.keys(placements).length === exercise.items.length ? ui().checkAnswers : `${ui().classifyMore} ${exercise.items.length - Object.keys(placements).length} ${ui().statementsMore}`}
        </Button>
      )}
      {showResults && (
        <div className={`rounded-xl p-5 text-center ${score >= 6 ? 'bg-green-50 border border-green-200' : 'bg-blue-50 border border-blue-200'}`}>
          {score === exercise.items.length && <div className="bounce-in mb-2"><CelebrationSVG className="mx-auto w-16 h-16"/></div>}
          <div className="text-2xl font-bold mb-1">{score}/{exercise.items.length} {ui().correct}</div>
          <p className="text-sm text-gray-600">{score >= 6 ? ui().icebergExcellent : ui().icebergHint}</p>
        </div>
      )}
    </div>
  );
}

function ExerciseMapping({ exercise, onComplete }) {
  const [answers, setAnswers] = useState({});
  const [loopType, setLoopType] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [activeConn, setActiveConn] = useState(0);

  const conn = exercise.connections[activeConn];
  const allAnswered = Object.keys(answers).length === exercise.connections.length;

  const selectPolarity = (pol) => {
    setAnswers(prev => ({ ...prev, [activeConn]: pol }));
    if (activeConn < exercise.connections.length - 1) {
      setTimeout(() => setActiveConn(activeConn + 1), 300);
    }
  };

  const check = () => {
    const correctPols = exercise.connections.filter((c, i) => answers[i] === c.correctPolarity).length;
    const typeCorrect = loopType === exercise.correctLoopType;
    const score = Math.round((correctPols / exercise.connections.length) * 80) + (typeCorrect ? 20 : 0);
    setShowResult(true);
    onComplete(score);
    setTimeout(() => { if (score >= 60) SoundManager.playComplete(); else SoundManager.playWrong(); }, 200);
  };

  return (
    <div className="space-y-6 fade-in">
      <div className="bg-white rounded-xl border p-5">
        <h4 className="font-bold mb-3">{ui().variablesSystem}</h4>
        <div className="flex flex-wrap gap-2">
          {exercise.variables.map((v, i) => (
            <div key={i} className="px-3 py-2 bg-gradient-to-r from-brand-50 to-accent-50 border border-brand-200 rounded-lg text-sm font-medium">{v}</div>
          ))}
        </div>
      </div>
      <div className="bg-white rounded-xl border p-5">
        <h4 className="font-bold mb-4">{ui().setPolarity}</h4>
        <div className="space-y-4">
          {exercise.connections.map((c, i) => (
            <div key={i} className={`p-4 rounded-lg border-2 transition-all ${i === activeConn ? 'border-brand-400 bg-brand-50' : answers[i] ? 'border-gray-200 bg-gray-50' : 'border-gray-200'}`}>
              <div className="flex items-center gap-3 mb-2 flex-wrap">
                <span className="font-semibold text-sm">{exercise.variables[c.from]}</span>
                <span className="text-gray-400">&rarr;</span>
                {answers[i] ? (
                  <span className={`font-bold text-lg ${showResult ? (answers[i] === c.correctPolarity ? 'text-green-600' : 'text-red-600') : 'text-brand-600'}`}>
                    ({answers[i]})
                  </span>
                ) : <span className="text-gray-300 text-lg">(?)</span>}
                <span className="text-gray-400">&rarr;</span>
                <span className="font-semibold text-sm">{exercise.variables[c.to]}</span>
                {showResult && answers[i] !== c.correctPolarity && (
                  <Badge color="warn">{ui().shouldBe} ({c.correctPolarity})</Badge>
                )}
              </div>
              {i === activeConn && !answers[i] && (
                <>
                  <p className="text-xs text-gray-500 mb-2 italic">{c.hint}</p>
                  <div className="flex gap-2">
                    <Button variant="secondary" size="sm" onClick={() => selectPolarity('+')}>{ui().sameDir}</Button>
                    <Button variant="secondary" size="sm" onClick={() => selectPolarity('-')}>{ui().oppositeDir}</Button>
                  </div>
                </>
              )}
              {answers[i] && i === activeConn && !allAnswered && (
                <button onClick={() => setActiveConn(activeConn + 1)} className="text-sm text-brand-600 hover:underline">{ui().nextConn}</button>
              )}
            </div>
          ))}
        </div>
      </div>
      {allAnswered && (
        <div className="bg-white rounded-xl border p-5">
          <h4 className="font-bold mb-3">{ui().whatLoopType}</h4>
          <div className="flex gap-3">
            {[{ key: 'reinforcing', label: ui().reinforcing }, { key: 'balancing', label: ui().balancing }].map(lt => (
              <button key={lt.key} onClick={() => !showResult && setLoopType(lt.key)}
                className={`flex-1 py-3 rounded-xl border-2 font-semibold transition-all ${loopType === lt.key ? 'border-brand-500 bg-brand-50' : 'border-gray-200 hover:border-gray-300'}`}>
                {lt.label}
              </button>
            ))}
          </div>
        </div>
      )}
      {!showResult && allAnswered && loopType && (
        <Button onClick={check} size="lg" className="w-full">{ui().checkAnswers}</Button>
      )}
      {showResult && (
        <div className="rounded-xl p-5 bg-blue-50 border border-blue-200">
          <p className="font-bold mb-2">{loopType === exercise.correctLoopType ? ui().correctExcl : ui().wrongExcl} {ui().thisIsA} <strong>{exercise.correctLoopType === 'reinforcing' ? ui().reinforcingLoop : ui().balancingLoop}</strong>.</p>
          <div className="text-sm text-gray-700 space-y-2">
            <p>{ui().loopExplanationIntro}</p>
            <p>• {ui().loopExplanationEven}</p>
            <p>• {ui().loopExplanationOdd}</p>
            <p>{ui().loopExplanationThisCase}</p>
          </div>
        </div>
      )}
    </div>
  );
}

function ExerciseLeverageRanking({ exercise, onComplete }) {
  const [items, setItems] = useState(() => [...exercise.items].sort(() => Math.random() - 0.5));
  const [showResult, setShowResult] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);

  const moveItem = (fromIdx, toIdx) => {
    const newItems = [...items];
    const [moved] = newItems.splice(fromIdx, 1);
    newItems.splice(toIdx, 0, moved);
    setItems(newItems);
  };

  const check = () => {
    setShowResult(true);
    const correct = items.every((item, i) => item.level === i + 1);
    const score = correct ? 100 : 50;
    onComplete(score);
    setTimeout(() => { if (score >= 60) SoundManager.playComplete(); else SoundManager.playWrong(); }, 200);
  };

  return (
    <div className="space-y-6 fade-in">
      <div className="bg-amber-50 border border-amber-200 rounded-xl p-4 text-sm text-amber-800">
        <strong>{ui().tip}</strong> {ui().dragInstruction}
      </div>
      <div className="space-y-2">
        {items.map((item, idx) => (
          <div key={item.id}
            draggable
            onDragStart={() => setDragIdx(idx)}
            onDragOver={e => e.preventDefault()}
            onDrop={() => { if (dragIdx !== null && dragIdx !== idx) { moveItem(dragIdx, idx); setDragIdx(null); } }}
            className={`p-4 rounded-xl border-2 cursor-grab active:cursor-grabbing transition-all ${
              showResult ? (item.level === idx + 1 ? 'border-green-300 bg-green-50' : 'border-red-300 bg-red-50') : 'border-gray-200 bg-white hover:border-brand-300 hover:shadow-sm'
            }`}>
            <div className="flex items-center gap-3">
              <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold ${showResult ? (item.level === idx + 1 ? 'bg-green-200 text-green-800' : 'bg-red-200 text-red-800') : 'bg-gray-100 text-gray-500'}`}>
                {idx + 1}
              </div>
              <div className="flex-1">
                <div className="font-medium text-sm">{item.text}</div>
                {showResult && <div className="text-xs text-gray-500 mt-1">{item.explanation}</div>}
              </div>
              {!showResult && <span className="text-gray-300">&#8942;&#8942;</span>}
            </div>
          </div>
        ))}
      </div>
      <div className="flex items-center justify-between text-xs text-gray-400 px-2">
        <span>{ui().lowestLeverage}</span>
        <span>{ui().highestLeverage}</span>
      </div>
      {!showResult && <Button onClick={check} size="lg" className="w-full">{ui().checkRanking}</Button>}
      {showResult && (
        <div className="rounded-xl p-5 bg-blue-50 border border-blue-200 text-sm text-gray-700">
          <p className="font-bold text-base mb-2">{ui().leverageHierarchy}</p>
          <p>{ui().leverageHierarchyDesc}</p>
        </div>
      )}
    </div>
  );
}

function ExerciseApplication({ exercise, onComplete }) {
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [email, setEmail] = useState(() => localStorage.getItem('st-user-email') || '');
  const [emailSent, setEmailSent] = useState(false);

  const allFilled = exercise.prompts.every(p => (answers[p.id] || '').trim().length > 15);

  const submit = () => {
    setSubmitted(true);
    onComplete(100);
    setTimeout(() => SoundManager.playComplete(), 200);
    try { localStorage.setItem('st-action-plan', JSON.stringify(answers)); } catch(e) {}
  };

  const sendEmail = () => {
    if (!email || !email.includes('@')) return;
    const _t = ui();
    const subject = encodeURIComponent(_t.emailSubject);
    const body = encodeURIComponent(
      _t.emailHeader + '\n' +
      '==========================================\n\n' +
      exercise.prompts.map((p, i) => `${i + 1}. ${p.question}\n\n${answers[p.id] || ''}\n`).join('\n---\n\n') +
      '\n==========================================\n' +
      _t.emailFooterTip + '\n' +
      '- ' + _t.emailQ1 + '\n' +
      '- ' + _t.emailQ2 + '\n' +
      '- ' + _t.emailQ3 + '\n\n' +
      _t.emailFooter
    );
    window.open(`mailto:${email}?subject=${subject}&body=${body}`, '_blank');
    setEmailSent(true);
  };

  return (
    <div className="space-y-6 fade-in">
      <div className="bg-brand-50 border border-brand-200 rounded-xl p-4 text-sm text-brand-800">
        {ui().applicationNote}
      </div>
      <div className="space-y-5">
        {exercise.prompts.map((p, i) => (
          <div key={p.id} className="bg-white rounded-xl border p-5">
            <label className="block font-semibold text-sm mb-2">{i + 1}. {p.question}</label>
            <textarea
              value={answers[p.id] || ''}
              onChange={e => setAnswers(prev => ({ ...prev, [p.id]: e.target.value }))}
              placeholder={p.placeholder}
              disabled={submitted}
              rows={3}
              className="w-full rounded-lg border border-gray-300 p-3 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 disabled:bg-gray-50 resize-none"
            />
          </div>
        ))}
      </div>
      {!submitted && <Button onClick={submit} disabled={!allFilled} size="lg" className="w-full">{allFilled ? ui().savePlan : ui().answerAll}</Button>}
      {submitted && (
        <div className="space-y-4">
          <div className="rounded-xl p-5 bg-green-50 border border-green-200 text-center">
            <div className="text-2xl mb-2">🎯</div>
            <div className="font-bold text-lg mb-1">{ui().planComplete}</div>
            <p className="text-sm text-gray-600">{ui().planReview}</p>
          </div>
          <div className="rounded-xl p-5 bg-white border-2 border-brand-200">
            <h4 className="font-bold text-sm mb-2 flex items-center gap-2">{ui().emailPlanTitle}</h4>
            <p className="text-xs text-gray-500 mb-3">{ui().emailPlanDesc}</p>
            {!emailSent ? (
              <div className="flex gap-2">
                <input
                  type="email"
                  value={email}
                  onChange={e => setEmail(e.target.value)}
                  placeholder="email@example.com"
                  className="flex-1 rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500"
                />
                <Button onClick={sendEmail} disabled={!email.includes('@')} size="sm">{ui().sendEmail}</Button>
              </div>
            ) : (
              <div className="text-sm text-green-600 font-semibold flex items-center gap-2">
                <span>✅</span> {ui().emailSent}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function ExerciseRouter({ module, level, onComplete }) {
  const ex = module.exercise;
  switch (ex.type) {
    case 'identify-system': return <ExerciseIdentifySystem exercise={ex} level={level} onComplete={onComplete} />;
    case 'build-loop': return <ExerciseBuildLoop exercise={ex} onComplete={onComplete} />;
    case 'iceberg': return <ExerciseIceberg exercise={ex} onComplete={onComplete} />;
    case 'mapping': return <ExerciseMapping exercise={ex} onComplete={onComplete} />;
    case 'leverage-ranking': return <ExerciseLeverageRanking exercise={ex} onComplete={onComplete} />;
    case 'application': return <ExerciseApplication exercise={ex} onComplete={onComplete} />;
    default: return <div>{ui().exerciseNotFound}</div>;
  }
}

function Assessment({ assessment, onComplete }) {
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState({});
  const [showExplanation, setShowExplanation] = useState(false);
  const [finished, setFinished] = useState(false);

  const q = assessment.questions[currentQ];
  const selected = answers[currentQ];
  const isCorrect = selected === q.correct;
  const totalCorrect = Object.entries(answers).filter(([k, v]) => assessment.questions[parseInt(k)].correct === v).length;

  const selectAnswer = (idx) => {
    if (showExplanation) return;
    setAnswers(prev => ({ ...prev, [currentQ]: idx }));
    setShowExplanation(true);
    setTimeout(() => { if (idx === q.correct) SoundManager.playCorrect(); else SoundManager.playWrong(); }, 100);
  };

  const nextQuestion = () => {
    setShowExplanation(false);
    if (currentQ < assessment.questions.length - 1) {
      setCurrentQ(currentQ + 1);
    } else {
      setFinished(true);
      const pct = Math.round((totalCorrect / assessment.questions.length) * 100);
      onComplete(pct);
      setTimeout(() => { if (pct >= 60) SoundManager.playLevelUp(); else SoundManager.playWrong(); }, 200);
    }
  };

  if (finished) {
    const pct = Math.round((totalCorrect / assessment.questions.length) * 100);
    const passed = pct >= 60;
    return (
      <div className="text-center space-y-4 fade-in">
        {passed && <div className="bounce-in"><CelebrationSVG className="mx-auto mb-2"/></div>}
        <div className={`inline-flex items-center justify-center w-24 h-24 rounded-full text-3xl font-bold ${passed ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
          {pct}%
        </div>
        <h3 className="text-xl font-bold">{passed ? ui().passed : ui().keepLearning}</h3>
        <p className="text-gray-600 text-sm">{totalCorrect}/{assessment.questions.length} {ui().correctAnswers}</p>
        <p className="text-gray-500 text-sm">{passed ? ui().passedMsg : ui().failedMsg}</p>
      </div>
    );
  }

  return (
    <div className="space-y-6 fade-in">
      <div className="flex items-center justify-between mb-2">
        <Badge color="brand">{ui().question} {currentQ + 1}/{assessment.questions.length}</Badge>
        <span className="text-sm text-gray-500">{totalCorrect} {ui().correct}</span>
      </div>
      <ProgressBar value={currentQ + 1} max={assessment.questions.length} />
      <div className="bg-white rounded-xl border p-6">
        <h4 className="font-bold text-lg mb-4">{q.q}</h4>
        <div className="space-y-3">
          {q.opts.map((opt, i) => (
            <button key={i} onClick={() => selectAnswer(i)}
              className={`w-full text-left p-4 rounded-xl border-2 transition-all text-sm ${
                showExplanation
                  ? i === q.correct ? 'border-green-400 bg-green-50 font-medium' : i === selected ? 'border-red-400 bg-red-50' : 'border-gray-200 opacity-50'
                  : i === selected ? 'border-brand-400 bg-brand-50' : 'border-gray-200 hover:border-gray-300 hover:bg-gray-50'
              }`}>
              <div className="flex items-center gap-3">
                <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-bold flex-shrink-0 ${
                  showExplanation
                    ? i === q.correct ? 'border-green-500 bg-green-500 text-white' : i === selected ? 'border-red-500 bg-red-500 text-white' : 'border-gray-300 text-gray-400'
                    : 'border-gray-300 text-gray-500'
                }`}>{String.fromCharCode(65 + i)}</div>
                <span>{opt}</span>
              </div>
            </button>
          ))}
        </div>
      </div>
      {showExplanation && (
        <div className={`rounded-xl p-4 ${isCorrect ? 'bg-green-50 border border-green-200' : 'bg-amber-50 border border-amber-200'}`}>
          <p className="font-semibold text-sm">{isCorrect ? ui().correctExcl : ui().wrongExcl} {ui().answerIs} {q.opts[q.correct]}</p>
        </div>
      )}
      {showExplanation && (
        <Button onClick={nextQuestion} size="lg" className="w-full">
          {currentQ < assessment.questions.length - 1 ? ui().nextQ : ui().seeResults}
        </Button>
      )}
    </div>
  );
}

function getKeyPointDiagram(title) {
  if (title.includes('Tảng Băng') || title.includes('Iceberg Model')) return React.createElement(IcebergDiagram, { className: 'mt-4' });
  if (title.includes('Thang suy luận') || title.includes('Ladder of Inference')) return React.createElement(LadderOfInferenceDiagram, { className: 'mt-4' });
  if (title.includes('Sơ đồ Nhân quả') || title.includes('Causal Loop')) return React.createElement(CausalLoopDiagram, { className: 'mt-4' });
  if (title.includes('Sơ đồ Tích lũy') || title.includes('Stock & Flow')) return React.createElement(StockFlowDiagram, { className: 'mt-4' });
  if (title.includes('Đồ thị Hành vi theo Thời gian') || title.includes('Behavior Over Time')) return React.createElement(BehaviorOverTimeDiagram, { className: 'mt-4' });
  if (title.includes('Đòn bẩy thấp') || title.includes('Tham số') || title.includes('Low Leverage') || title.includes('Parameters')) return React.createElement(LeveragePointsDiagram, { className: 'mt-4' });
  return null;
}

  const currentLevels = lang === 'en' ? LEVELS_EN : LEVELS;
  const currentModules = lang === 'en' ? MODULES_EN : MODULES;

  useEffect(() => { setTab('learn'); setExerciseKey(0); setAssessmentKey(0); window.scrollTo(0, 0); }, [module.id]);

    onUpdateProgress(module.id, 'exercise', score);

  const handleAssessmentComplete = (score) => {

        {tab === 'assessment' && (
          <div className="space-y-4">
            <div className="bg-white rounded-xl border p-5">
              <h3 className="font-bold text-lg mb-1">{module.assessment.title}</h3>
              <div className="text-gray-600 text-sm space-y-2">
                <p>{t.assessDesc1}</p>
                <p>{t.assessDesc2}</p>
                <p>{t.assessDesc3}</p>

            <Assessment key={assessmentKey} assessment={module.assessment} onComplete={handleAssessmentComplete} />
            {modProgress.assessment >= 0 && (
              <div className="flex flex-wrap gap-3 justify-center mt-4">
                {modProgress.assessment >= 60 ? (
                  isLastModule ? (
                    <Button variant="success" onClick={() => { SoundManager.playCourseComplete(); setTimeout(onBack, 800); }}>{t.courseComplete}</Button>

                    <Button variant="success" onClick={onNextModule}>{t.nextModule}</Button>

                  <>
                    <Button variant="secondary" onClick={() => setTab('learn')}>{t.reviewLesson}</Button>
                    <Button variant="accent" onClick={retryAssessment}>{t.retryAssess}</Button>
                  </>
                )}

            )}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('register'); // register, welcome, level, dashboard, module, certificate
  const [level, setLevel] = useState(null);
  const [activeModule, setActiveModule] = useState(null);
  const [userName, setUserName] = useState('');
  const [userEmail, setUserEmail] = useState('');
  const [regName, setRegName] = useState('');
  const [regEmail, setRegEmail] = useState('');
  const [regHoneypot, setRegHoneypot] = useState(''); // Honeypot - bots will fill this
  const [regFormLoadTime] = useState(() => Date.now()); // Track when form was shown
  const [lang, setLang] = useState(() => localStorage.getItem('st-lang') || 'vi');
  const changeLang = (l) => { setLang(l); localStorage.setItem('st-lang', l); currentLang = l; };
  // Update module-level currentLang on each render
  currentLang = lang;
  const t = UI[lang] || UI.vi;
  const currentLevels = lang === 'en' ? LEVELS_EN : LEVELS;
  const currentModules = lang === 'en' ? MODULES_EN : MODULES;
  const [progress, setProgress] = useState(() => {
    try { return JSON.parse(localStorage.getItem('st-progress') || '{}'); } catch { return {}; }
  });

  useEffect(() => {
    localStorage.setItem('st-progress', JSON.stringify(progress));
  }, [progress]);

  useEffect(() => {
    const savedName = localStorage.getItem('st-user-name');
    const savedEmail = localStorage.getItem('st-user-email');
    const savedLevel = localStorage.getItem('st-level');
    if (savedName && savedEmail) {
      setUserName(savedName);
      setUserEmail(savedEmail);
      if (savedLevel) { setLevel(savedLevel); setScreen('dashboard'); }
      else { setScreen('welcome'); }
    }
  }, []);

  const handleRegister = () => {
    if (!regName.trim() || !regEmail.trim() || !regEmail.includes('@')) return;
    // Anti-bot: Honeypot check - if filled, it's a bot
    if (regHoneypot && regHoneypot.length > 0) {
      console.warn('[Security] Honeypot triggered, blocking submission');
      setScreen('welcome'); // Silently redirect — don't tell the bot it was caught
      return;
    }
    // Anti-bot: Time check - bots submit too fast
    const timeTaken = Date.now() - regFormLoadTime;
    if (timeTaken < 3000) {
      console.warn('[Security] Form submitted too fast (' + timeTaken + 'ms), likely a bot');
      setScreen('welcome');
      return;
    }
    // Anti-bot: Email domain validation - block known junk/disposable domains
    const emailLower = regEmail.trim().toLowerCase();
    const blockedDomains = ['junktest.com', 'junkmail.com', 'tempmail.com', 'trashmail.com', 'mailinator.com', '10minutemail.com', 'guerrillamail.com', 'throwaway.email', 'fakeinbox.com', 'test.com', 'example.com'];
    const domain = emailLower.split('@')[1] || '';
    if (blockedDomains.some(d => domain.includes(d)) || domain.endsWith('.invalid') || domain.endsWith('.test')) {
      console.warn('[Security] Blocked domain:', domain);
      alert(lang === 'en' ? 'Please use a valid email address.' : 'Vui lòng sử dụng địa chỉ email hợp lệ.');
      return;
    }
    // Anti-bot: Name must contain at least one space (first name + last name) OR be 3+ chars
    if (regName.trim().length < 2) {
      console.warn('[Security] Name too short');
      return;
    }
    const name = regName.trim();
    const email = regEmail.trim();
    const registeredAt = new Date().toISOString();
    setUserName(name);
    setUserEmail(email);
    localStorage.setItem('st-user-name', name);
    localStorage.setItem('st-user-email', email);
    localStorage.setItem('st-registered-at', registeredAt);
    // Store registration in a local queue as a backup (in case Wix fails)
    try {
      const queue = JSON.parse(localStorage.getItem('st-registration-queue') || '[]');
      queue.push({ name, email, registeredAt, status: 'pending' });
      localStorage.setItem('st-registration-queue', JSON.stringify(queue));
    } catch (e) {}
    setScreen('welcome');
    // Save to Wix CMS with retry
    (async () => {
      const saveToWix = async (attempt) => {
        console.log('[Wix] Attempting to save registration, attempt:', attempt);
        const tokenRes = await fetch('https://www.wixapis.com/oauth2/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ clientId: '66d5ac9b-d1fb-4a09-a417-72d691aafb4b', grantType: 'anonymous' })
        });
        if (!tokenRes.ok) throw new Error('Token fetch failed: ' + tokenRes.status);
        const tokenData = await tokenRes.json();
        const token = tokenData.access_token;
        const insertRes = await fetch('https://www.wixapis.com/wix-data/v2/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': token },
          body: JSON.stringify({
            dataCollectionId: 'SystemsThinkingRegistrations',
            dataItem: { data: { fullName: name, email: email, level: '', registeredAt: registeredAt } }
          })
        });
        if (!insertRes.ok) {
          const errText = await insertRes.text();
          throw new Error('Insert failed: ' + insertRes.status + ' ' + errText);
        }
        const insertData = await insertRes.json();
        console.log('[Wix] ✓ Registration saved successfully:', insertData.dataItem?.id);
        if (insertData.dataItem?.id) {
          localStorage.setItem('st-wix-record-id', insertData.dataItem.id);
          // Mark in queue
          try {
            const queue = JSON.parse(localStorage.getItem('st-registration-queue') || '[]');
            const last = queue[queue.length - 1];
            if (last && last.email === email) { last.status = 'saved'; last.wixId = insertData.dataItem.id; }
            localStorage.setItem('st-registration-queue', JSON.stringify(queue));
          } catch (e) {}
        }
        return true;
      };
      // Try 3 times with exponential backoff
      for (let attempt = 1; attempt <= 3; attempt++) {
        try {
          await saveToWix(attempt);
          return;
        } catch (e) {
          console.error('[Wix] Attempt ' + attempt + ' failed:', e.message);
          if (attempt < 3) await new Promise(r => setTimeout(r, attempt * 1000));
        }
      }
      console.error('[Wix] All retry attempts failed. Registration is safe in localStorage.');
    })();
  };

  const chooseLevel = (s) => {
    setLevel(s);
    localStorage.setItem('st-level', s);
    setScreen('dashboard');
    // Update Wix record with level
    const recordId = localStorage.getItem('st-wix-record-id');
    if (recordId) {
      (async () => {
        try {
          const tokenRes = await fetch('https://www.wixapis.com/oauth2/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clientId: '66d5ac9b-d1fb-4a09-a417-72d691aafb4b', grantType: 'anonymous' })
          });
          const tokenData = await tokenRes.json();
          await fetch('https://www.wixapis.com/wix-data/v2/items/' + recordId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': tokenData.access_token },
            body: JSON.stringify({
              dataCollectionId: 'SystemsThinkingRegistrations',
              dataItem: { id: recordId, data: { fullName: userName, email: userEmail, level: s, registeredAt: localStorage.getItem('st-registered-at') || new Date().toISOString() } }
            })
          });
        } catch (e) { console.log('Wix level update skipped:', e.message); }
      })();
    }
  };

  const resetCourse = () => {
    setLevel(null);
    setProgress({});
    localStorage.removeItem('st-level');
    localStorage.removeItem('st-progress');
    localStorage.removeItem('st-user-name');
    localStorage.removeItem('st-user-email');
    setUserName('');
    setUserEmail('');
    setRegName('');
    setRegEmail('');
    setScreen('register');
  };

  const updateProgress = (moduleId, type, score) => {
    setProgress(prev => ({
      ...prev,
      [moduleId]: { ...prev[moduleId], [type]: score },
    }));
  };

  const completedModules = currentModules.filter(m => (progress[m.id]?.assessment || 0) >= 60).length;
  const allComplete = completedModules === currentModules.length;
  const levelData = level ? currentLevels.find(s => s.id === level) : null;

  // REGISTRATION SCREEN
  if (screen === 'register') {
    const canRegister = regName.trim().length >= 2 && regEmail.trim().includes('@');
    return (
      <><LanguageSwitcher lang={lang} onChange={changeLang} /><SoundToggle /><div className="min-h-screen fun-bg confetti-bg flex flex-col px-4">
        <div className="flex-1 flex items-center justify-center">
        <div className="max-w-md w-full slide-up">
          <div className="text-center mb-8">
            <div className="flex justify-center mb-3"><img src="npv-logo.jpg" alt="NPV Logo" className="h-16 object-contain" /></div>
            <h1 className="font-display text-3xl sm:text-4xl font-black text-gray-900 mb-2">{t.courseTitle}</h1>
            <p className="text-gray-500">{t.registerTitle}</p>
          </div>
          <div className="bg-white/80 backdrop-blur rounded-3xl border-2 border-white shadow-lg p-6 sm:p-8 space-y-5">
            {/* Honeypot field - hidden from real users, bots will fill it */}

              <label htmlFor="website_url">Website (leave blank)</label>
              <input
                type="text"

                tabIndex="-1"

                onChange={e => setRegHoneypot(e.target.value)}

            </div>
            <div>
              <label className="block text-sm font-bold text-gray-700 mb-1.5">{t.fullName}</label>
              <input
                type="text"
                value={regName}
                onChange={e => setRegName(e.target.value)}
                placeholder={lang === 'en' ? 'John Doe' : 'Nguyễn Văn A'}

              />
              <p className="text-xs text-amber-600 mt-1.5">{t.nameWarning}</p>
            </div>
            <div>
              <label className="block text-sm font-bold text-gray-700 mb-1.5">{t.email}</label>
              <input

                value={regEmail}
                onChange={e => setRegEmail(e.target.value)}

                className="w-full rounded-xl border-2 border-gray-200 px-4 py-3 text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all"
              />
              <p className="text-xs text-gray-400 mt-1.5">{t.emailNote}</p>
            </div>
            <Button onClick={handleRegister} disabled={!canRegister} size="lg" className="w-full pulse-glow">

            <p className="text-xs text-gray-400 text-center">{t.freeNote}</p>
          </div>
        </div>
        </div>
        <Footer />
      </div></>
    );
  }

  // WELCOME SCREEN
  if (screen === 'welcome') {
    return (
      <><LanguageSwitcher lang={lang} onChange={changeLang} /><SoundToggle /><div className="min-h-screen fun-bg confetti-bg">
        <div className="max-w-5xl mx-auto px-4 py-16 sm:py-20 relative">

          <div className="hidden sm:block absolute top-40 right-12 float-slow" style={{animationDelay:'1s'}}><DecorativeShape type="triangle" color="#ec4899" size={35}/></div>
          <div className="hidden sm:block absolute bottom-40 left-16 float-slow" style={{animationDelay:'2s'}}><DecorativeShape type="diamond" color="#f59e0b" size={30}/></div>
          <div className="hidden sm:block absolute bottom-20 right-20 float-slow" style={{animationDelay:'3s'}}><DecorativeShape type="hexagon" color="#10b981" size={36}/></div>
          <div className="hidden sm:block absolute top-32 left-1/4 float-slow" style={{animationDelay:'4s'}}><DecorativeShape type="circle" color="#38bdf8" size={24}/></div>
          <div className="hidden sm:block absolute top-60 right-1/4 float-slow" style={{animationDelay:'1.5s'}}><DecorativeShape type="triangle" color="#fb7185" size={28}/></div>

          <div className="text-center slide-up relative">
            {/* NetworkSVG behind hero text */}
            <div className="hidden sm:block absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-[0.07] pointer-events-none">
              <NetworkSVG className="w-[400px] h-[400px] spin-slow"/>
            </div>
            <div className="inline-flex items-center gap-2 px-5 py-2.5 bg-white/80 backdrop-blur border border-brand-200 text-brand-700 rounded-full text-sm font-bold mb-8 shadow-sm">
              <span className="float inline-block">🧩</span> {t.welcomeBadge}
            </div>
            <h1 className="font-display text-5xl sm:text-7xl font-black text-gray-900 mb-2 tracking-tight leading-tight relative z-[1]">
              {t.courseTitle}
            </h1>
            <h2 className="font-display text-4xl sm:text-6xl font-black hero-gradient mb-6 relative z-[1]">
              {t.courseSubtitle}
            </h2>
            <p className="text-lg sm:text-xl text-gray-600 max-w-2xl mx-auto mb-14 leading-relaxed relative z-[1]">
              {t.welcomeSub1}<br className="hidden sm:block" />
              {t.welcomeSub2}
            </p>
            <div className="grid sm:grid-cols-3 gap-5 max-w-3xl mx-auto mb-14 relative">
              <div className="hidden sm:block absolute -top-4 -left-6 decoration-dots w-full h-full rounded-3xl pointer-events-none"></div>
              {[
                { icon: '🎯', title: t.f1Title, desc: t.f1Desc, bg: 'from-brand-50 to-brand-100', border: 'border-brand-200' },
                { icon: '🎮', title: t.f2Title, desc: t.f2Desc, bg: 'from-accent-50 to-accent-100', border: 'border-accent-200' },

              ].map((f, i) => (
                <div key={i} className={`bg-gradient-to-br ${f.bg} rounded-3xl p-6 border ${f.border} card-hover text-center wiggle relative z-[1]`}>
                  <div className="text-4xl mb-3 float" style={{ animationDelay: `${i * 0.3}s` }}>{f.icon}</div>

                  <p className="text-gray-500 text-sm">{f.desc}</p>
                </div>
              ))}
            </div>
            <Button onClick={() => setScreen('level')} size="lg" className="pulse-glow text-lg">

            </Button>
          </div>
        </div>
        <Footer />
      </div></>
    );
  }

  // LEVEL SELECTION

    return (
      <><LanguageSwitcher lang={lang} onChange={changeLang} /><SoundToggle /><div className="min-h-screen fun-bg confetti-bg">
        <div className="max-w-3xl mx-auto px-4 py-16">
          <div className="text-center mb-10 fade-in">
            <div className="text-5xl mb-4 float">👋</div>
            <h2 className="font-display text-3xl sm:text-4xl font-black text-gray-900 mb-3">{t.levelTitle}</h2>
            <p className="text-gray-500 max-w-lg mx-auto text-lg">{t.levelSub}</p>

          <div className="grid gap-3">
            {currentLevels.map((s, i) => (

            onUpdateProgress={updateProgress}
            onBack={() => { setScreen('dashboard'); setActiveModule(null); }}
            onNextModule={() => { const nextId = mod.id + 1; if (nextId <= currentModules.length) { setActiveModule(nextId); } else { setScreen('dashboard'); setActiveModule(null); } }} />
          <Footer />
        </div>
      </div></>
    );
  }

  // CERTIFICATE
  if (screen === 'certificate') {
    return (
      <><LanguageSwitcher lang={lang} onChange={changeLang} /><SoundToggle /><div className="min-h-screen fun-bg confetti-bg py-12 px-4">
        <div className="max-w-4xl mx-auto">
          <button onClick={() => setScreen('dashboard')} className="flex items-center gap-2 text-gray-500 hover:text-brand-600 mb-6 text-sm font-medium">{t.backDash}</button>
          <Certificate level={level} progress={progress} userName={userName} lang={lang} />
          <Footer />
        </div>
      </div></>
    );
  }

  // DASHBOARD
  return (
    <><LanguageSwitcher lang={lang} onChange={changeLang} /><SoundToggle /><div className="min-h-screen fun-bg confetti-bg">
      <div className="bg-white/80 backdrop-blur-lg border-b border-brand-100 sticky top-0 z-10">
        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <h1 className="font-display text-lg font-bold text-gray-900">🧩 {t.courseTitle}</h1>
            <Badge color="brand">{levelData?.icon} {levelData?.name}</Badge>
          </div>
          <div className="flex items-center gap-3">
            <div className="text-sm font-semibold text-brand-600">{completedModules}/{currentModules.length} {t.done}</div>
            <button onClick={resetCourse} className="text-xs text-gray-400 hover:text-coral-500 transition-colors">{t.reset}</button>
          </div>
        </div>
        <div className="max-w-5xl mx-auto px-4 pb-3">
          <ProgressBar value={completedModules} max={currentModules.length} />
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-4 py-8">
        {allComplete && (
          <div className="bg-gradient-to-r from-brand-600 via-accent-500 to-pop-400 rounded-3xl p-6 text-white mb-8 flex items-center justify-between flex-wrap gap-4 bounce-in shadow-xl">
            <div>
              <h3 className="text-xl font-bold mb-1">{t.completeTitle}</h3>
              <p className="text-white/80 text-sm">{t.completeSub}</p>
            </div>
            <Button variant="secondary" onClick={() => { SoundManager.playCourseComplete(); setScreen('certificate'); }}>{t.viewCert}</Button>
          </div>
        )}

        <div className="grid gap-4">
          {currentModules.map((mod, i) => {
            const mp = progress[mod.id] || {};
            const isLocked = i > 0 && !((progress[currentModules[i - 1].id]?.assessment || 0) >= 60);
            const isComplete = (mp.assessment || 0) >= 60;
            const hasStarted = mp.exercise >= 0 || mp.assessment >= 0;

            return (
              <button key={mod.id} onClick={() => { if (!isLocked) { setActiveModule(mod.id); setScreen('module'); } }}
                disabled={isLocked}
                className={`bg-white/80 backdrop-blur rounded-2xl border-2 p-5 sm:p-6 text-left transition-all shadow-sm ${isLocked ? 'opacity-40 cursor-not-allowed border-gray-200' : isComplete ? 'border-mint-300 card-hover cursor-pointer animated-border-left animated-border-left-complete' : 'border-white hover:border-brand-300 card-hover cursor-pointer' + (!isLocked && !isComplete ? ' animated-border-left' : '')}`}>
                <div className="flex items-start gap-4">
                  <div className={`w-14 h-14 rounded-2xl flex items-center justify-center text-2xl flex-shrink-0 ${
                    isComplete ? 'bg-gradient-to-br from-mint-100 to-mint-200' : hasStarted ? 'bg-gradient-to-br from-brand-100 to-accent-100' : isLocked ? 'bg-gray-100' : 'bg-gradient-to-br from-brand-50 to-accent-50'
                  }`}>
                    {isLocked ? '🔒' : isComplete ? '✅' : mod.icon}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-1">
                      <h3 className="font-bold text-gray-900">{t.module} {mod.id}: {mod.title}</h3>
                      {isComplete && <Badge color="success">{t.complete}</Badge>}
                      {hasStarted && !isComplete && <Badge color="warn">{t.inProgress}</Badge>}
                    </div>
                    <p className="text-gray-500 text-sm mb-3">{mod.subtitle} · {mod.duration}</p>
                    {hasStarted && (
                      <div className="flex gap-4 text-xs text-gray-400">
                        {mp.exercise >= 0 && <span>{t.tabPractice}: {mp.exercise}%</span>}
                        {mp.assessment >= 0 && <span>{t.tabAssess}: {mp.assessment}%</span>}
                      </div>
                    )}
                  </div>
                  <div className="text-gray-300 text-xl flex-shrink-0">&rarr;</div>
                </div>
              </button>
            );
          })}
        </div>
        <Footer />
      </div>
    </div></>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
