<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================================
// SOUND MANAGER
// ============================================================

const SoundManager = {
  ctx: null,
  sfxEnabled: true,
  musicEnabled: false,

  init() {
    if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    const sfx = localStorage.getItem('st-sfx');
    const music = localStorage.getItem('st-music');
    if (sfx !== null) this.sfxEnabled = sfx === 'true';
    if (music !== null) this.musicEnabled = music === 'true';
  },

  _tone(freq, duration, type = 'sine', volume = 0.15) {
    if (!this.sfxEnabled || !this.ctx) return;
    try { this.ctx.resume(); } catch(e) {}
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  },

  playClick() { this._tone(800, 0.08, 'sine', 0.08); },

  playCorrect() {
    this._tone(523, 0.15, 'sine', 0.12);
    setTimeout(() => this._tone(784, 0.2, 'sine', 0.12), 120);
  },

  playWrong() {
    this._tone(330, 0.15, 'sine', 0.08);
    setTimeout(() => this._tone(262, 0.2, 'sine', 0.08), 120);
  },

  playComplete() {
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => this._tone(f, 0.25, 'sine', 0.1), i * 100);
    });
  },

  playLevelUp() {
    [523, 659, 784, 1047, 1319].forEach((f, i) => {
      setTimeout(() => this._tone(f, 0.3, 'triangle', 0.12), i * 120);
    });
  },

  playCourseComplete() {
    if (!this.sfxEnabled || !this.ctx) return;
    try { this.ctx.resume(); } catch(e) {}
    // Grand celebration: C major arpeggio up, then triumphant chord, then sparkle
    const notes = [523, 659, 784, 1047, 1319, 1568];
    notes.forEach((f, i) => { setTimeout(() => this._tone(f, 0.35, 'triangle', 0.12), i * 110); });
    // Triumphant chord at the end
    setTimeout(() => {
      [1047, 1319, 1568].forEach(f => this._tone(f, 0.6, 'sine', 0.08));
    }, 750);
    // Sparkle high notes
    setTimeout(() => { this._tone(2093, 0.15, 'sine', 0.06); }, 1100);
    setTimeout(() => { this._tone(2637, 0.15, 'sine', 0.05); }, 1250);
    setTimeout(() => { this._tone(3136, 0.2, 'sine', 0.04); }, 1400);
    // Final grand chord
    setTimeout(() => {
      [1047, 1319, 1568, 2093].forEach(f => this._tone(f, 1.0, 'sine', 0.06));
    }, 1600);
  },

  playNotification() { this._tone(1047, 0.1, 'sine', 0.06); },

  musicOsc: null,
  musicGain: null,

  startMusic() {
    if (!this.musicEnabled || !this.ctx || this.musicOsc) return;
    try { this.ctx.resume(); } catch(e) {}
    this.musicGain = this.ctx.createGain();
    this.musicGain.gain.value = 0.03;
    this.musicGain.connect(this.ctx.destination);
    this.musicOsc = [261.63, 329.63, 392].map(freq => {
      const osc = this.ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.connect(this.musicGain);
      osc.start();
      return osc;
    });
  },

  stopMusic() {
    if (this.musicOsc) {
      this.musicOsc.forEach(o => { try { o.stop(); } catch(e) {} });
      this.musicOsc = null;
    }
  },

  toggleSfx() {
    this.sfxEnabled = !this.sfxEnabled;
    localStorage.setItem('st-sfx', this.sfxEnabled);
    if (this.sfxEnabled) this.playClick();
    return this.sfxEnabled;
  },

  toggleMusic() {
    this.musicEnabled = !this.musicEnabled;
    localStorage.setItem('st-music', this.musicEnabled);
    if (this.musicEnabled) this.startMusic();
    else this.stopMusic();
    return this.musicEnabled;
  }
};

document.addEventListener('click', function initSound() {
  SoundManager.init();
  if (SoundManager.musicEnabled) SoundManager.startMusic();
  document.removeEventListener('click', initSound);
}, { once: true });

const MODULES = [
  {
    id: 1, title: 'Tư Duy Hệ Thống (Systems Thinking) là gì?', subtitle: 'Nhìn thấy cả rừng LẪN từng cái cây',
    icon: '🔭', duration: '15 phút', color: 'brand',
    content: {
      intro: "Bạn đã bao giờ xử lý xong một vấn đề, nhưng ngay sau đó lại phát sinh vấn đề khác? Hoặc càng cố gắng làm việc chăm chỉ hơn, kết quả lại càng đi xuống?\n\nĐó không phải là ngẫu nhiên. Đó là dấu hiệu bạn đang ở trong một hệ thống — nhưng chưa thực sự nhìn thấy cách nó vận hành.\n\nTư duy hệ thống (Systems Thinking) giúp bạn nhìn thế giới không phải như những mảnh ghép rời rạc, mà như một mạng lưới các yếu tố liên kết và tác động qua lại lẫn nhau. Khi nhận ra được những mối liên hệ này, bạn không chỉ hiểu vì sao mọi thứ xảy ra, mà còn biết chính xác nên can thiệp vào đâu để tạo ra thay đổi hiệu quả nhất.",
      keyPoints: [
        { title: 'Từ những phần rời rạc đến bức tranh tổng thể', text: 'Từ nhỏ, chúng ta quen với việc "bẻ nhỏ" vấn đề: tách từng phần, tìm một nguyên nhân cụ thể, rồi sửa từng chỗ. Cách này rất hiệu quả với máy móc — nơi mọi thứ vận hành theo logic tuyến tính. Nhưng thế giới thực thì không đơn giản như vậy.\n\nMột đội bóng mạnh không chỉ vì có 11 cá nhân xuất sắc, mà vì họ hiểu nhau và phối hợp nhịp nhàng. Một công ty thành công không chỉ nhờ từng phòng ban giỏi, mà nhờ cách các bộ phận kết nối và vận hành cùng nhau.\n\nTư duy hệ thống giúp bạn chuyển góc nhìn: từ việc chỉ chăm chăm vào từng phần riêng lẻ, sang nhìn thấy các mối quan hệ, sự tương tác và cách mọi thứ cùng tạo nên kết quả cuối cùng.' },
        { title: 'Quan hệ nhân quả vòng tròn (Circular Causality)', text: 'Chúng ta thường quen nghĩ theo đường thẳng: A gây ra B, là hết. Nhưng thực tế hiếm khi đơn giản như vậy — B thường quay lại tác động ngược lên A, tạo thành một vòng lặp liên tục.\n\nVí dụ rất đời thường: khi bạn tự tin hơn, bạn dám thử nhiều hơn → bạn học được nhiều hơn → và từ đó lại càng tự tin hơn. Đó là một vòng lặp tích cực.\n\nNgược lại: khi bạn sợ thất bại, bạn né tránh thử thách → không có tiến bộ → và nỗi sợ lại càng lớn hơn. Đó là vòng lặp tiêu cực.\n\nCùng một cơ chế, nhưng khác hướng vận hành sẽ dẫn đến kết quả hoàn toàn khác. Khi nhận ra những vòng lặp này, bạn sẽ hiểu vì sao có những vấn đề ngày càng trầm trọng theo thời gian, trong khi có những thành công lại có xu hướng tự khuếch đại.' },
        { title: 'Tính trội (Emergence)', text: 'Đây là một trong những khái niệm thú vị nhất của tư duy hệ thống: khi các phần kết hợp với nhau, chúng có thể tạo ra những đặc tính mà từng phần riêng lẻ không hề có.\n\nLấy ví dụ kẹt xe — không ai ra đường với mục tiêu gây tắc nghẽn. Nhưng khi hàng nghìn người cùng đưa ra những quyết định hợp lý cho cá nhân mình (như đi làm lúc 8 giờ sáng), kết quả chung lại là ùn tắc.\n\nVăn hóa doanh nghiệp cũng tương tự. Không ai thực sự "ngồi xuống để thiết kế" nó, nhưng nó dần hình thành từ vô số tương tác nhỏ mỗi ngày giữa con người với nhau.\n\nHiểu về tính trội giúp bạn thay đổi góc nhìn: thay vì chỉ đổ lỗi cho từng cá nhân, bạn bắt đầu nhìn sâu hơn vào cấu trúc và cách hệ thống vận hành — nơi thực sự tạo ra hành vi và kết quả.' },
        { title: 'Mô hình tư duy (Mental Model)', text: 'Mỗi người chúng ta đều mang trong đầu một "bản đồ" về cách thế giới vận hành. Nhờ đó, ta xử lý thông tin nhanh hơn, ra quyết định gọn hơn. Nhưng chính bản đồ này cũng âm thầm lọc đi những điều không phù hợp với niềm tin sẵn có.\n\nVí dụ, nếu bạn tin rằng "nhân viên chỉ làm tốt khi bị giám sát chặt", bạn sẽ khó nhìn thấy — hoặc vô tình bỏ qua — những bằng chứng cho thấy trao quyền và tự chủ mới là thứ tạo ra hiệu suất cao hơn, dù chúng đang diễn ra ngay trước mắt.\n\nTư duy hệ thống bắt đầu từ một nhận thức rất đơn giản nhưng quan trọng: "Bản đồ trong đầu mình chưa chắc đã đúng." Khi chấp nhận điều đó, bạn mở ra khả năng nhìn thực tế rõ ràng hơn — và đưa ra những quyết định chính xác hơn.' },
      ],
      levelExamples: {
        beginner: 'Bạn háo hức nhận thêm việc để ghi điểm với sếp. Nhưng rồi khối lượng công việc tăng lên quá mức, bạn bắt đầu quá tải, chất lượng giảm sút. Kết quả là bạn nhận nhiều góp ý chỉnh sửa hơn — đồng nghĩa với việc lại có thêm việc phải làm. Một vòng lặp "càng làm càng quá tải" cứ thế hình thành.\n\nNhận ra sớm vòng lặp này sẽ giúp bạn biết cách đặt giới hạn hợp lý, thay vì để bản thân rơi vào trạng thái kiệt sức.',
        professional: 'Đội của bạn từng cố rút ngắn quy trình để cho ra kết quả nhanh hơn — bỏ bớt bước kiểm tra, giảm thời gian rà soát. Ban đầu mọi thứ có vẻ nhanh hơn. Nhưng rồi sai sót bắt đầu nhiều lên, phải mất thời gian sửa lại, và cuối cùng tiến độ còn chậm hơn lúc đầu.\n\nTốc độ, nếu không đi kèm chất lượng, có thể tự tạo ra sự trì trệ.\n\nTư duy hệ thống giúp bạn nhìn ra vòng lặp này — để hiểu rằng đôi khi "đi nhanh hơn" lại chính là cách nhanh nhất khiến bạn chậm lại.',
        'middle-manager': 'Bạn tuyển thêm nhân sự để đạt chỉ tiêu quý, nhưng việc đào tạo (onboarding) tốn thời gian, nhân viên kỳ cựu phải dành công sức hướng dẫn thay vì trực tiếp làm việc, nên năng suất ngắn hạn giảm đi.\n\nKhoảng cách thời gian giữa tuyển dụng và hiệu quả thực sự (độ trễ) thường khó thấy nếu không nhìn bằng lăng kính tư duy hệ thống.',
        executive: 'Bạn bắt đầu bằng việc cắt chi phí, ví dụ như giảm đội ngũ chăm sóc khách hàng. Ngay sau đó, trải nghiệm khách hàng giảm sút, tỷ lệ rời bỏ tăng lên, doanh thu bị ảnh hưởng — và áp lực lại quay về buộc bạn phải cắt giảm thêm.\n\nĐó là một vòng xoáy đi xuống, nơi mỗi quyết định ngắn hạn lại tạo ra hệ quả dài hạn ngoài dự tính.\n\nTư duy hệ thống giúp bạn nhìn rõ điều này: không phải lúc nào cắt chi phí cũng là tối ưu. Trong nhiều trường hợp, đó có thể là quyết định "đắt giá" nhất nếu nó làm suy yếu chính những yếu tố tạo ra giá trị lâu dài.',

  {
    id: 2, title: 'Vòng Phản Hồi (Feedback Loop) & Động lực học', subtitle: 'Động cơ chi phối hành vi hệ thống',
    icon: '🔄', duration: '20 phút', color: 'accent',
    content: {
      intro: "Nếu tư duy hệ thống là cách bạn nhìn thế giới, thì vòng phản hồi (Feedback Loop) chính là thứ bạn cần nhận ra đầu tiên. Chúng là \"động cơ\" âm thầm vận hành phía sau mọi hệ thống.\n\nKhi hiểu được vòng phản hồi, giống như bạn vừa đeo một chiếc kính mới — bỗng nhiên mọi thứ trở nên rõ ràng hơn. Bạn bắt đầu thấy vì sao có những vấn đề cứ tự xấu đi theo thời gian, dù ai cũng đang nỗ lực. Và ngược lại, vì sao có những điều tốt đẹp lại có thể tự lan rộng và phát triển.\n\nChỉ có hai loại vòng phản hồi cơ bản. Nhưng một khi đã nắm được chúng, bạn sẽ nhận ra chúng xuất hiện ở khắp nơi — trong công việc, trong các mối quan hệ, và cả trong cách xã hội vận hành.",
      keyPoints: [
        { title: 'Vòng tăng cường (Reinforcing Loop – R)', text: 'Vòng tăng cường vận hành như một hiệu ứng "lăn cầu tuyết" — càng đi, lực càng lớn. Một ví dụ quen thuộc là lãi kép: tiền tạo ra lãi, lãi nhập vào gốc, và gốc lớn hơn lại sinh ra nhiều lãi hơn.\n\nTrong công việc, đó có thể là một vòng xoáy đi lên: bạn làm tốt → được trao cơ hội tốt hơn → học thêm kỹ năng → và tiếp tục làm tốt hơn nữa. Nhưng nó cũng có thể đi theo chiều ngược lại: thiếu người → những người còn lại quá tải → thêm người rời đi → hệ thống càng thiếu hụt.\n\nĐiểm quan trọng: "tăng cường" không đồng nghĩa với "tích cực". Nó chỉ đơn giản là một cơ chế tự khuếch đại — đã đi theo hướng nào thì sẽ càng bị đẩy mạnh theo hướng đó.' },
        { title: 'Vòng cân bằng (Balancing Loop – B)', text: 'Nếu vòng tăng cường giống như "chân ga", thì vòng cân bằng chính là "phanh". Vai trò của nó là đưa hệ thống quay về một trạng thái mục tiêu hoặc giữ mọi thứ ổn định.\n\nVí dụ quen thuộc là điều hòa nhiệt độ: khi quá nóng → máy lạnh bật → nhiệt độ giảm → máy tắt. Cơ thể con người cũng vậy — nóng thì toát mồ hôi, lạnh thì run để tự điều chỉnh.\n\nTrong doanh nghiệp, vòng này xuất hiện khi giá tăng quá cao → khách hàng rời bỏ → doanh thu giảm → buộc phải điều chỉnh giá xuống.\n\nHiểu về vòng cân bằng giúp bạn lý giải một điều rất phổ biến: nhiều thay đổi dù bạn cố thúc đẩy đến đâu vẫn bị "kéo ngược" trở lại. Không phải vì nỗ lực chưa đủ, mà vì hệ thống đang tự điều chỉnh để quay về trạng thái cân bằng ban đầu.' },
        { title: 'Độ trễ (Delay)', text: 'Đây là "kẻ phá bĩnh" thầm lặng trong hầu hết mọi hệ thống. Phần lớn hành động không tạo ra kết quả ngay lập tức — luôn tồn tại một khoảng trễ.\n\nBạn bắt đầu tập gym hôm nay, nhưng phải vài tháng sau mới thấy rõ thay đổi. Bạn tuyển người hôm nay, nhưng cần thời gian để họ thật sự hòa nhập và tạo ra giá trị.\n\nVấn đề nằm ở chỗ: trong khoảng chờ đó, chúng ta dễ mất kiên nhẫn và bắt đầu "tăng liều" — tập quá sức dẫn đến chấn thương, hoặc tuyển thêm người khi hệ thống chưa kịp hấp thụ.\n\nĐộ trễ cũng là nguyên nhân tạo ra những dao động khó chịu: điều chỉnh quá mạnh → vượt mục tiêu → điều chỉnh ngược lại → lại vượt tiếp. Giống như khi bạn chỉnh nước nóng lạnh trong vòi sen — vì phản hồi đến chậm, mỗi lần chỉnh đều dễ bị quá tay.\n\nHiểu được độ trễ giúp bạn biết khi nào cần hành động, và quan trọng hơn — khi nào cần chờ.' },
        { title: 'Tính chi phối (Dominance)', text: 'Trong thực tế, một hệ thống không chỉ có một vòng lặp — mà là nhiều vòng cùng vận hành song song: có vòng tăng cường, có vòng cân bằng. Nhưng tại mỗi thời điểm, sẽ luôn có một vòng "chiếm ưu thế" và quyết định hành vi tổng thể của hệ thống.\n\nVí dụ, khi một startup mới ra mắt, vòng tăng cường kiểu "nhiều người dùng → nhiều nội dung → thu hút thêm người dùng" thường chi phối, tạo ra đà tăng trưởng rất nhanh. Nhưng đến một ngưỡng nào đó, vòng cân bằng bắt đầu nổi lên: "nhiều người dùng → hệ thống quá tải → trải nghiệm giảm → người dùng rời đi".\n\nHiểu được vòng nào đang chi phối giúp bạn đọc được "nhịp" của hệ thống — biết khi nào đà tăng trưởng sẽ chững lại, và quan trọng hơn, chuẩn bị trước thay vì bị bất ngờ.' },

      levelExamples: {
        beginner: 'Tăng cường (Reinforcing): Bạn học một kỹ năng → bạn được giao việc thú vị hơn → bạn học nhanh hơn → bạn phát triển (chu kỳ tích cực). Cân bằng (Balancing): Bạn nhận quá nhiều việc → căng thẳng tăng → bạn chậm lại → khối lượng điều chỉnh. Độ trễ (Delay): Nỗ lực networking hôm nay sẽ không mang lại kết quả trong nhiều tháng.',
        professional: 'Trong công việc, có 3 cơ chế đang âm thầm ảnh hưởng đến hiệu quả của bạn:\n\n🔄 Vòng tăng cường – "bánh đà sự nghiệp": Khi bạn làm tốt → được giao việc quan trọng hơn → học thêm kỹ năng mới → và từ đó làm tốt hơn nữa. Cứ như vậy, bạn tạo được một đà phát triển cho chính mình — càng làm, càng tiến bộ.\n\n⚖️ Vòng cân bằng – "lực kéo ngược": Khi công việc tồn đọng ngày càng nhiều → bạn bắt đầu làm nhanh cho kịp → chất lượng giảm → cuối cùng phải quay lại sửa và dọn dẹp. Hệ thống tự kéo bạn chậm lại để "trả nợ" những gì đã bỏ qua.\n\n⏳ Độ trễ – "tác động đến muộn": Một quyết định về quy trình hôm nay có thể trông ổn. Nhưng phải 3–6 tháng sau, khi công việc tăng lên, bạn mới thấy rõ nó có hiệu quả hay không. Vì kết quả đến chậm, nên rất dễ chủ quan hoặc đánh giá sai.\n\nNhìn ra ba điều này giúp bạn làm việc thông minh hơn — không chỉ nhanh, mà còn bền.',
        'middle-manager': 'Có những vòng lặp tích cực: tinh thần đội nhóm tốt → năng suất cao → kết quả khả quan → được ghi nhận → tinh thần càng tốt hơn.\n\nNhưng cũng có giới hạn cân bằng: khi đội lớn hơn, chi phí giao tiếp tăng, mỗi lần tuyển thêm nhân sự hiệu quả không còn tăng tương ứng.\n\nVà đừng quên độ trễ: thay đổi văn hóa bạn bắt đầu hôm nay thường cần 2–3 quý mới phản ánh rõ trên hành vi thực tế của đội.',
        executive: 'Trong hệ thống kinh doanh, có những vòng lặp giúp bạn tăng trưởng, và cũng có những lực kéo làm chậm lại.\n\n🔄 Vòng tăng cường (Reinforcing): Thị phần tăng → quy mô lớn hơn → chi phí trên mỗi đơn vị giảm → giá cạnh tranh hơn → lại tiếp tục thu hút thêm thị phần.\n\n⚖️ Vòng cân bằng (Balancing): Tăng trưởng → hệ thống trở nên phức tạp hơn → hiệu quả vận hành giảm → tốc độ tăng trưởng chậm lại.\n\n⏳ Độ trễ (Delay): Những khoản đầu tư chiến lược như thương hiệu hay R&D thường không mang lại kết quả ngay. Thông thường, phải mất 1–3 năm (hoặc lâu hơn) mới thấy rõ tác động.\n\nHiểu được ba yếu tố này giúp bạn ra quyết định chính xác hơn: biết khi nào cần đẩy mạnh tăng trưởng, khi nào cần tối ưu hệ thống, và khi nào cần kiên nhẫn chờ đợi kết quả dài hạn.',
        entrepreneur: '🔄 Vòng tăng cường (Reinforcing): Khách hàng hài lòng → họ giới thiệu thêm khách mới → doanh thu tăng → bạn có thêm nguồn lực để cải thiện sản phẩm → khách hàng càng hài lòng hơn.\n\n⚖️ Vòng cân bằng (Balancing): Khi tăng trưởng nhanh, bạn phải tuyển thêm người và tăng chi phí vận hành → hệ thống trở nên nặng nề hơn → tốc độ tăng trưởng có xu hướng chậm lại.\n\n⏳ Độ trễ (Delay): Những cải tiến sản phẩm hôm nay thường cần thời gian để thị trường nhận ra và phản hồi — có thể mất nhiều tháng trước khi bạn thấy kết quả rõ ràng.\n\nHiểu được ba yếu tố này giúp bạn điều chỉnh kỳ vọng và đưa ra quyết định tăng trưởng một cách thực tế và bền vững hơn.',

    content: {

      keyPoints: [
        { title: 'Mô hình Tảng Băng (Iceberg Model)', text: 'Hãy hình dung một tảng băng trôi. Phần bạn nhìn thấy trên mặt nước — chỉ khoảng 10% — là các sự kiện: "Ba nhân viên vừa nghỉ", "Doanh thu tháng này giảm". Đây là những gì rõ ràng nhất, và cũng là nơi đa số chúng ta dừng lại để phản ứng.\n\nNhưng phần quan trọng hơn nằm bên dưới mặt nước.\n\n📈 Tầng xu hướng (Patterns): Những gì lặp lại theo thời gian — ví dụ "tỷ lệ nghỉ việc tăng đều suốt 18 tháng".\n\n🏗️ Tầng cấu trúc (Structure): Cách hệ thống được thiết kế — như "không có lộ trình thăng tiến nội bộ, muốn phát triển phải nhảy việc".\n\n🧠 Tầng mô hình tư duy (Mental Models): Những niềm tin ngầm định — ví dụ "mọi người nghỉ vì lương, mà mình thì không cạnh tranh được".\n\nNếu bạn chỉ xử lý ở tầng sự kiện — như tuyển người thay thế — vấn đề sẽ sớm quay lại. Thay đổi thực sự chỉ xảy ra khi bạn nhìn sâu hơn và can thiệp vào các tầng bên dưới, đặc biệt là khi dám đặt câu hỏi với những giả định tưởng như "hiển nhiên" ở tầng sâu nhất.' },

      intro: "Bạn đã biết cách \"nghĩ\" theo hệ thống — giờ là lúc học cách \"vẽ\" nó ra.\n\nVì sao cần vẽ? Vì hệ thống luôn phức tạp hơn những gì chúng ta có thể giữ trong đầu. Khi bạn đưa các mối quan hệ ra giấy (hoặc bảng trắng), ba điều quan trọng sẽ xảy ra:\n\n1. Bạn bắt đầu nhìn thấy những kết nối mà trước đó mình đã bỏ qua\n2. Cả đội có thể cùng nhìn vào một bức tranh chung để trao đổi và thống nhất\n3. Bạn nhận ra đâu là điểm can thiệp hiệu quả nhất, thay vì làm mọi thứ dàn trải\n\nĐừng lo nếu bạn chưa quen với việc vẽ sơ đồ — mọi thứ đều có thể bắt đầu từ những hình rất đơn giản. Quan trọng không phải là vẽ đẹp, mà là vẽ đúng những gì đang thực sự diễn ra.",
      keyPoints: [
        { title: 'Sơ đồ Nhân quả (Causal Loop Diagram – CLD)', text: 'Đây là công cụ cốt lõi của tư duy hệ thống — và cách dùng lại rất đơn giản.\n\nBạn bắt đầu bằng việc liệt kê các biến (những yếu tố có thể tăng hoặc giảm), rồi nối chúng với nhau bằng mũi tên để thể hiện mối quan hệ. Mỗi mũi tên đi kèm một dấu:\n\n• (+): khi yếu tố này tăng, yếu tố kia cũng tăng (hoặc cùng giảm)\n• (–): khi yếu tố này tăng, yếu tố kia giảm (ngược chiều)\n\nVí dụ: Khối lượng công việc (+)→ Căng thẳng (+)→ Sai sót (+)→ Làm lại (+)→ Khối lượng công việc\n\nVì tất cả đều là dấu (+), đây là một vòng tăng cường — và nó lý giải vì sao kiệt sức có thể tự khuếch đại theo thời gian.\n\nĐiểm mạnh của CLD là: khi bạn vẽ ra, bạn không còn chỉ "cảm thấy" vấn đề nữa — bạn bắt đầu nhìn thấy cấu trúc đứng sau nó. Và khi đã thấy được cấu trúc, bạn sẽ biết nên can thiệp vào đâu để tạo ra thay đổi thực sự.' },
        { title: 'Sơ đồ Tích lũy & Dòng chảy (Stock & Flow)', text: 'Trong một hệ thống, có những thứ thay đổi rất chậm — vì chúng là "tích lũy" (Stock), giống như nước trong một bồn tắm. Ví dụ: kiến thức của đội ngũ, niềm tin của khách hàng, hay nợ kỹ thuật. Những thứ này không thể thay đổi ngay lập tức.\n\nThay vào đó, bạn chỉ có thể tác động thông qua "dòng chảy" (Flow) — tức là những gì đi vào và đi ra khỏi phần tích lũy đó.\n\nVí dụ: niềm tin của khách hàng (tích lũy) được xây dựng dần qua từng trải nghiệm tốt (dòng vào), nhưng có thể sụt giảm nhanh chóng sau mỗi sự cố (dòng ra).\n\nHiểu điều này giúp bạn thực tế hơn và kiên nhẫn hơn. Những thứ lớn như văn hóa hay uy tín không thể "thay đổi trong một đêm", vì chúng là kết quả của rất nhiều tích lũy theo thời gian. Cách duy nhất là điều chỉnh những hành động nhỏ mỗi ngày — để dòng chảy thay đổi, và từ đó tích lũy dần dần chuyển biến.' },
        { title: 'Vòng tròn Kết nối (Connection Circle)', text: 'Nếu sơ đồ nhân quả khiến bạn thấy hơi phức tạp, hãy bắt đầu với vòng tròn kết nối — một cách làm rất đơn giản nhưng cực kỳ hiệu quả khi làm việc nhóm.\n\nCách thực hiện:\n\n1. Mỗi người đề xuất những yếu tố quan trọng liên quan đến vấn đề, rồi viết chúng thành một vòng tròn\n2. Lần lượt vẽ mũi tên thể hiện các yếu tố ảnh hưởng qua lại với nhau\n3. Quan sát xem có vòng lặp nào xuất hiện không\n\nĐừng cố làm cho hoàn hảo ngay từ đầu — sai cũng không sao.\n\nGiá trị thật sự không nằm ở việc vẽ ra một sơ đồ "đúng", mà nằm ở cuộc trao đổi trong lúc cùng nhau vẽ. Bạn sẽ nhận ra mỗi người đang nhìn hệ thống theo một cách khác nhau — và khi ghép lại, bức tranh tổng thể sẽ đầy đủ và sâu sắc hơn bất kỳ góc nhìn riêng lẻ nào.' },
        { title: 'Đồ thị Hành vi theo Thời gian (Behavior Over Time Graph)', text: 'Trước khi đi vào những sơ đồ phức tạp, hãy bắt đầu bằng một bước rất đơn giản: vẽ đồ thị thể hiện các yếu tố quan trọng thay đổi như thế nào theo thời gian.\n\n• Trục X: thời gian\n• Trục Y: giá trị\n\nVí dụ, bạn có thể vẽ cùng lúc "số lượng khách hàng" và "mức độ hài lòng" trong 12 tháng. Nếu khách hàng tăng nhưng mức hài lòng lại giảm, đó là một tín hiệu rất rõ: có vấn đề ở cấu trúc bên dưới — có thể bạn đang tăng trưởng nhanh hơn khả năng phục vụ.\n\nMột số dạng đồ thị thường gặp:\n\n📈 Tăng nhanh (hàm mũ): dấu hiệu của vòng tăng cường đang chi phối\n📊 Dao động lên xuống: thường do vòng cân bằng có độ trễ\n📉 Hình chữ S: tăng trưởng rồi chững lại khi chạm giới hạn\n⚠️ Sụp đổ: vòng tăng cường tiêu cực vượt kiểm soát\n\nMỗi dạng đường không chỉ là hình vẽ — nó là "manh mối" cho bạn biết hệ thống bên dưới đang vận hành như thế nào.' },
      ],
      levelExamples: {
        beginner: 'Hãy thử nhìn năng suất của mình như một hệ thống: năng lượng → khả năng tập trung → chất lượng công việc → phản hồi từ quản lý → động lực → rồi quay lại năng lượng.\n\nKhi thấy rõ vòng lặp này, bạn sẽ hiểu rằng nghỉ ngơi không phải là lười biếng — mà là cách "bảo trì" để hệ thống của bạn vận hành tốt hơn.',
        professional: 'Hãy thử "vẽ" lại động lực công việc của chính bạn như một vòng lặp:\n\nKhối lượng đầu việc → Áp lực thời gian → Chất lượng đầu ra → Phản hồi từ khách hàng/đối tác → Uy tín cá nhân → Cơ hội mới → … rồi quay lại với nhiều đầu việc hơn\n\nKhi nhìn toàn bộ vòng lặp này, bạn sẽ không còn chỉ tập trung vào việc "làm nhanh hơn", mà bắt đầu thấy rõ điểm nào đang kéo hiệu quả xuống — và đâu là mắt xích cần được cải thiện.',
        'middle-manager': 'Hãy hình dung sức khỏe đội nhóm như một vòng lặp: tinh thần nhân viên → năng suất → trải nghiệm khách hàng → doanh thu → đầu tư vào con người → trở lại tinh thần nhân viên.\n\nXác định xem vòng lặp bị yếu hay gián đoạn ở đâu, đó chính là điểm bạn can thiệp sẽ tạo ra tác động lớn nhất.',
        executive: 'Hãy lập bản đồ động lực vận hành của tổ chức như một chuỗi liên kết:\n\nChiến lược rõ ràng → Mức độ đồng thuận trong tổ chức → Tốc độ triển khai → Kết quả trên thị trường → Niềm tin từ hội đồng → Cách phân bổ nguồn lực → Khả năng đầu tư cho chiến lược tiếp theo.\n\nKhi đặt tất cả lên cùng một bức tranh, bạn sẽ thấy ngay những điểm độ trễ hoặc lệch pha đang làm đứt gãy vòng lặp tăng trưởng — từ đó xác định chính xác nơi cần can thiệp để hệ thống vận hành trơn tru hơn.',
        entrepreneur: 'Hãy lập bản đồ động cơ tăng trưởng của bạn:\n\nChất lượng sản phẩm → Mức độ hài lòng của khách hàng → Giới thiệu → Thu hút khách hàng mới → Doanh thu → Tái đầu tư vào sản phẩm → Chất lượng sản phẩm.\n\nKhi nhìn toàn bộ chuỗi này, hãy xác định mắt xích nào đang yếu nhất. Chính điểm đó là nút thắt cổ chai, nơi bạn nên tập trung cải thiện để thúc đẩy cả hệ thống vận hành hiệu quả hơn.',

  {
    id: 5, title: 'Điểm Đòn Bẩy (Leverage Point)', subtitle: 'Nơi thay đổi nhỏ tạo kết quả lớn',
    icon: '⚡', duration: '20 phút', color: 'brand',
    content: {
      intro: "Bạn đã biết cách nhìn hệ thống, và cũng biết cách vẽ nó ra. Giờ đến câu hỏi quan trọng nhất: \"Nên can thiệp ở đâu?\"\n\nKhông phải mọi điểm can thiệp đều giống nhau. Có những thay đổi tiêu tốn rất nhiều công sức nhưng gần như không tạo ra khác biệt. Ngược lại, có những điều chỉnh rất nhỏ lại đủ sức làm xoay chuyển cả hệ thống.\n\nDonella Meadows — một trong những người đặt nền móng cho tư duy hệ thống — đã chỉ ra rằng các điểm can thiệp (Leverage Points) có một thứ bậc rõ ràng, từ yếu đến mạnh.\n\nKhi bạn hiểu được thứ bậc này, cách bạn ra quyết định sẽ thay đổi hoàn toàn: không còn làm nhiều hơn, mà là chọn đúng chỗ để tạo ra tác động lớn nhất.",
      keyPoints: [
        { title: 'Đòn bẩy thấp: Tham số (Parameters)', text: 'Đây là điểm mà hầu hết mọi người thường bắt đầu — và cũng là lý do nhiều nỗ lực không tạo ra thay đổi đáng kể.\n\nTham số đơn giản là các con số: tăng ngân sách 10%, tuyển thêm 3 người, nâng KPI lên 20%. Nghe rất hợp lý, nhưng trong thực tế, hệ thống thường "hấp thụ" những thay đổi này mà hành vi tổng thể gần như không đổi.\n\nVí dụ: một đội đang phải tăng ca liên tục. Giải pháp quen thuộc là tuyển thêm 2 người. Nhưng người mới cần thời gian để làm quen, trong khi người cũ phải dành thời gian hướng dẫn. Kết quả là áp lực không giảm ngay — và vài tháng sau, mọi thứ lại quay về như cũ.\n\nGiống như việc tăng nhiệt độ điều hòa trong một căn phòng bị hở gió — bạn tốn thêm năng lượng, nhưng vẫn không giải quyết được vấn đề gốc.' },
        { title: 'Đòn bẩy trung bình: Vòng phản hồi (Feedback Loop)', text: 'So với việc chỉ điều chỉnh con số, một cách hiệu quả hơn nhiều là thay đổi dòng chảy thông tin — tức là tạo mới, tăng cường, hoặc làm yếu các vòng phản hồi trong hệ thống.\n\nKhi thông tin đúng đến đúng người, đúng thời điểm, hành vi sẽ tự thay đổi — không cần ép buộc.\n\nVí dụ: trước đây nhiều bệnh viện không công bố tỷ lệ nhiễm trùng. Nhưng khi dữ liệu này được minh bạch, các bệnh viện tự cải thiện quy trình của mình — không cần thêm quy định. Thông tin đã tự tạo ra một vòng phản hồi giúp hệ thống điều chỉnh.\n\nTrong công việc, bạn có thể áp dụng rất thực tế: thay vì chỉ nhìn vào kết quả cuối cùng (Lag Indicators), hãy hiển thị rõ các chỉ số dẫn dắt (Lead Indicators) — những gì đang xảy ra ngay bây giờ.\n\nKhi cả đội "nhìn thấy" hệ thống đang vận hành ra sao, họ sẽ tự điều chỉnh hành vi — và đó mới là thay đổi bền vững.' },
        { title: 'Đòn bẩy cao: Quy tắc (Rules) & Cấu trúc (Structure)', text: 'Quy tắc chính là \"luật chơi\" của hệ thống. Ai có quyền quyết định? Điều gì được đo lường? Điều gì được thưởng? Những thứ này âm thầm định hình hành vi của mọi người mỗi ngày.\n\nKhi bạn thay đổi quy tắc, bạn không cần ép ai thay đổi — hành vi sẽ tự thay đổi theo.\n\nMột ví dụ kinh điển từ Toyota: họ cho phép bất kỳ công nhân nào dừng dây chuyền sản xuất khi phát hiện lỗi. Trước đó, chỉ quản lý mới có quyền này. Chỉ một thay đổi nhỏ trong quy tắc, nhưng tác động rất lớn — lỗi giảm, chất lượng tăng, và văn hóa chuyển từ \"che giấu vấn đề\" sang \"phát hiện sớm\".\n\nTrong tổ chức của bạn, rất nhiều thứ thực ra là \"quy tắc\": tiêu chí thăng tiến, cách đánh giá hiệu suất, hay ai có quyền phê duyệt. Đây mới là những yếu tố thực sự quyết định cách hệ thống vận hành — và cũng là nơi tạo ra thay đổi mạnh mẽ nhất nếu bạn can thiệp đúng.' },
        { title: 'Đòn bẩy cao nhất: Mô hình tư duy (Mental Model)', text: 'Đây là tầng sâu nhất — và cũng là nơi tạo ra tác động mạnh nhất.\n\nMô hình tư duy là những niềm tin nền tảng định hình cách bạn nhìn thế giới. Từ đó, mọi thứ khác — quy tắc, cấu trúc, hành vi — đều được xây dựng lên.\n\nKhi mô hình tư duy thay đổi, cả hệ thống sẽ thay đổi theo.\n\nVí dụ:\n\n• Khi y tế chuyển từ \"chữa bệnh\" sang \"phòng bệnh\", toàn bộ hệ thống phải thay đổi — từ nghiên cứu, chính sách đến hành vi của người dân\n• Khi giáo dục chuyển từ \"truyền kiến thức\" sang \"phát triển năng lực\", cách dạy, cách học, cách đánh giá… đều phải thiết kế lại\n\nĐiểm cốt lõi là: khi bạn thay đổi câu hỏi \"chúng ta thực sự đang cố làm gì?\", thì mọi câu trả lời phía sau cũng sẽ thay đổi theo.\n\nĐây là đòn bẩy mạnh nhất — nhưng cũng khó nhất. Vì phần lớn thời gian, chúng ta không nhận ra mình đang vận hành theo một mô hình tư duy cụ thể. Và khi không nhìn thấy nó, bạn cũng không thể thay đổi nó.' },
      ],
      levelExamples: {
        beginner: 'Thấp: Làm thêm giờ. Trung bình: Xin phản hồi 1-1 hàng tuần từ quản lý (vòng phản hồi mới). Cao: Đề xuất thay đổi cách đo thành công — từ giờ làm việc sang kết quả đầu ra (quy tắc). Cao nhất: Chuyển từ "mình cần chứng minh mình bận" sang "mình cần tạo giá trị."',
        professional: '⬇️ Mức thấp: Bổ sung thêm công cụ hoặc tài liệu mới vào quy trình làm việc để hỗ trợ công việc hiệu quả hơn.\n\n⬆️ Mức trung bình: Thiết lập cách đo lường rõ ràng để biết đâu là những việc thực sự tạo ra giá trị, dựa trên phản hồi thực tế.\n\n🔼 Mức cao: Chuyển từ việc đánh giá dựa trên khối lượng công việc sang đánh giá dựa trên kết quả đạt được và tác động mang lại.\n\n🔝 Mức cao nhất: Thay đổi tư duy, không chỉ dừng lại ở việc "hoàn thành nhiệm vụ được giao" mà tập trung vào việc "giải quyết đúng vấn đề của khách hàng hoặc tổ chức".',
        'middle-manager': '⬇️ Cấp thấp: đơn giản là phê duyệt thêm tăng ca.\n\n⬆️ Cấp trung bình: xây dựng bảng điều khiển đội nhóm, tập trung vào các chỉ số dẫn dắt (Lead Indicators) thay vì chỉ nhìn kết quả sau (Lag Indicators).\n\n🔼 Cấp cao: tái cấu trúc để chuyển trọng tâm từ KPI cá nhân sang kết quả của cả đội.\n\n🔝 Cao nhất: thay đổi bản sắc đội nhóm, từ "chúng tôi chỉ hoàn thành nhiệm vụ" thành "chúng tôi chịu trách nhiệm với kết quả."',
        executive: '⬇️ Đòn bẩy thấp: Chỉ cần tăng ngân sách.\n\n⬆️ Đòn bẩy trung bình: Xây dựng dashboard cấp hội đồng, phản ánh "sức khỏe hệ thống" thay vì chỉ nhìn vào tài chính — giúp tạo vòng phản hồi rõ ràng hơn.\n\n🔼 Đòn bẩy cao: Thiết kế lại cơ chế khuyến khích và khen thưởng trên toàn tổ chức — thay đổi "luật chơi" để điều chỉnh hành vi.\n\n🔝 Đòn bẩy cao nhất: Thay đổi mô hình tư duy — chuyển từ tối đa hóa giá trị cho cổ đông sang tạo giá trị cho tất cả các bên liên quan, từ đó định nghĩa lại hoàn toàn "thành công" của tổ chức.',
        entrepreneur: '⬇️ Đòn bẩy thấp: Tăng chi tiêu cho quảng cáo.\n\n⬆️ Đòn bẩy trung bình: Thiết lập vòng phản hồi trực tiếp từ khách hàng vào quá trình phát triển sản phẩm — để liên tục cải tiến dựa trên dữ liệu thực tế.\n\n🔼 Đòn bẩy cao: Thay đổi cách định giá, từ "chi phí + lợi nhuận" sang định giá dựa trên giá trị mang lại cho khách hàng — điều chỉnh "luật chơi" của thị trường.\n\n🔝 Đòn bẩy cao nhất: Thay đổi mô hình tư duy — từ "chúng tôi bán sản phẩm" sang "chúng tôi giải quyết vấn đề" — qua đó tái định nghĩa toàn bộ mô hình kinh doanh và cách bạn tạo ra giá trị.',

  {
    id: 6, title: 'Áp Dụng vào Công Việc (Practical Application)', subtitle: 'Từ lý thuyết đến thực hành hàng ngày',
    icon: '🚀', duration: '25 phút', color: 'accent',
    content: {
      intro: "Đây là bài quan trọng nhất — bởi vì tư duy hệ thống chỉ thực sự có giá trị khi bạn đem nó vào sử dụng hằng ngày. Năm bài trước giúp bạn có kiến thức; còn bài này giúp bạn hình thành thói quen.\n\nMục tiêu không phải là biến bạn thành người giỏi vẽ sơ đồ phức tạp, mà là xây dựng một phản xạ tự nhiên: trước khi phản ứng với bất kỳ vấn đề nào, bạn dừng lại một chút và tự hỏi: \"Hệ thống nào đang vận hành ở đây?\"\n\nChỉ một thay đổi nhỏ như vậy thôi cũng đủ để nâng cao đáng kể chất lượng quyết định của bạn — từ cảm tính sang có suy nghĩ, từ phản ứng nhanh sang hiểu đúng bản chất.",
      keyPoints: [
        { title: 'Kiểm tra hệ thống trong 5 phút', text: 'Đây là một trong những kỹ thuật đơn giản nhưng hiệu quả nhất bạn có thể áp dụng ngay. Trước bất kỳ cuộc họp, quyết định hay email quan trọng nào, hãy dành ra 5 phút để tự hỏi mình bốn câu:\n\n1️⃣ "Mình đang ở trong hệ thống nào?" — Giúp bạn nhìn rộng hơn, không bị mắc kẹt trong góc nhìn trước mắt.\n\n2️⃣ "Vòng phản hồi nào đang diễn ra?" — Giúp bạn hiểu vì sao mọi thứ lại vận hành theo cách hiện tại.\n\n3️⃣ "Mình đang xử lý triệu chứng hay nguyên nhân gốc?" — Tránh việc tốn công cho những giải pháp chỉ mang tính tạm thời.\n\n4️⃣ "Nếu vẽ ra, bức tranh này sẽ trông thế nào?" — Buộc bạn suy nghĩ theo mối quan hệ và dòng chảy, thay vì các sự kiện rời rạc.\n\nBan đầu, việc này có thể khiến bạn cảm thấy chậm lại. Nhưng chỉ sau vài tuần, nó sẽ trở thành một phản xạ tự nhiên. Và rồi bạn sẽ nhận ra: 5 phút suy nghĩ trước đó có thể giúp bạn tiết kiệm hàng giờ "chữa cháy" về sau.' },
        { title: 'Thiết kế can thiệp', text: 'Bạn đã nhìn ra vấn đề và vẽ được bức tranh tổng thể — bước tiếp theo là thiết kế giải pháp. Nguyên tắc quan trọng nhất: một can thiệp tốt là can thiệp đi cùng hệ thống, không phải chống lại nó.\n\nCụ thể, bạn có thể bắt đầu từ những hướng sau:\n\n1️⃣ Tận dụng cái đang hoạt động tốt — Tìm những vòng tăng cường tích cực đã tồn tại và khuếch đại chúng. Đừng vội xây mới khi hệ thống đã có sẵn thứ đang chạy hiệu quả.\n\n2️⃣ Bổ sung phản hồi còn thiếu — Nhiều vấn đề xuất phát từ việc thông tin không đến đúng người, đúng lúc. Hãy tìm xem "mắt xích" nào đang thiếu và lấp vào đó.\n\n3️⃣ Rút ngắn độ trễ — Nếu phản hồi mất quá lâu, hãy tìm cách làm cho nó đến nhanh hơn. Tốc độ phản hồi thường quyết định chất lượng điều chỉnh.\n\n4️⃣ Thử nhỏ trước khi làm lớn — Đừng triển khai diện rộng ngay. Hãy bắt đầu bằng một thử nghiệm nhỏ (pilot), học nhanh, rồi mới mở rộng.\n\n5️⃣ Theo dõi tác dụng phụ — Hệ thống luôn có xu hướng phản ứng theo những cách bạn không lường trước. Vì vậy, hãy quan sát kỹ các hậu quả ngoài ý muốn.\n\nVà trước mỗi can thiệp, hãy tự hỏi một câu rất quan trọng: "Nếu việc này thành công, nó sẽ vô tình kích hoạt thêm vòng lặp nào khác?"' },
        { title: 'Giao tiếp theo hệ thống', text: 'Bạn có thể hiểu rất rõ tư duy hệ thống, nhưng nếu không truyền đạt được cho người khác thì tác động sẽ bị giới hạn. Tin vui là: bạn không cần biến mình thành người đi dạy lý thuyết. Chỉ cần thay đổi cách bạn nói và cách bạn hỏi.\n\nThay vì dùng những khái niệm trừu tượng như "vòng phản hồi cân bằng", hãy nói theo cách gần gũi hơn: "Cái này giống như bộ điều nhiệt — khi quá nóng thì tự tắt, khi quá lạnh thì tự bật." Người nghe sẽ hiểu ngay mà không cần giải thích dài dòng.\n\nKhi trình bày vấn đề, đừng chỉ nói — hãy vẽ. Chỉ cần 3–4 ô đơn giản trên bảng trắng, nối với nhau bằng mũi tên, là đủ để cả phòng nhìn ra mối liên hệ. Những điều tưởng như rời rạc bỗng trở nên rõ ràng — kiểu "ai cũng biết nhưng chưa ai gọi tên".\n\nVà nếu có một câu hỏi bạn nên mang theo trong mọi cuộc thảo luận, thì đó là: "Nếu chúng ta làm điều này, chuyện gì sẽ xảy ra tiếp theo? Và sau đó nữa thì sao?"\n\nChỉ cần hỏi đúng câu, bạn đã bắt đầu dẫn dắt mọi người suy nghĩ theo hệ thống rồi.' },
        { title: 'Xây dựng tổ chức học tập (Learning Organization)', text: 'Ứng dụng cao nhất của tư duy hệ thống không nằm ở việc giải một vấn đề cụ thể, mà là tạo ra một tổ chức biết tự học và tự điều chỉnh liên tục.\n\nVà điểm bắt đầu không ở đâu xa — mà chính là từ bạn.\n\n1️⃣ Đổi câu hỏi khi có vấn đề — Khi chuyện không như ý xảy ra, thay vì hỏi "lỗi của ai?", hãy hỏi "hệ thống nào đã tạo ra kết quả này?". Dần dần, đội của bạn sẽ chuyển từ tâm thế đổ lỗi sang tò mò và muốn hiểu bản chất.\n\n2️⃣ Chia sẻ cách bạn suy nghĩ — Đừng giữ bản đồ hệ thống cho riêng mình. Khi bạn chia sẻ nó một cách công khai, người khác không chỉ thấy kết quả mà còn học được cách bạn nhìn nhận vấn đề.\n\n3️⃣ Nhìn lại theo cấu trúc, không chỉ theo cảm nhận — Sau mỗi dự án, thay vì chỉ hỏi "cái gì tốt, cái gì chưa tốt?", hãy đi sâu hơn: "cấu trúc nào đã giúp mọi thứ chạy tốt?" và "cấu trúc nào đang cản trở?"\n\nĐiểm thú vị của tư duy hệ thống là nó có tính lan tỏa. Khi bạn bắt đầu đặt những câu hỏi khác đi, cách suy nghĩ của mọi người xung quanh cũng sẽ dần thay đổi theo.' },

      keyPoints: [
        { title: 'The Iceberg Model', text: "Imagine an iceberg. The part you see above the waterline — only about 10% — is the events: \"Three employees just quit,\" \"Revenue dropped this month.\" These are the most visible things, and also where most of us stop to react.\n\nBut the more important part lies beneath the surface.\n\nPatterns: What keeps repeating over time — e.g., \"turnover has been rising steadily for 18 months.\"\n\nStructure: How the system is designed — e.g., \"there is no internal promotion path; people have to leave to advance.\"\n\nMental Models: Hidden underlying beliefs — e.g., \"people leave because of pay, and we cannot compete with big companies.\"\n\nIf you only address the event level — like hiring replacements — the problem will soon return. Real change only happens when you look deeper and intervene at the levels below, especially when you dare to question assumptions that seem \"obvious\" at the deepest level." },
        { title: 'Ladder of Inference', text: "Every day, your brain processes thousands of pieces of information by climbing an \"invisible staircase\" — very quickly, almost automatically:\n\n1. Observe: you see a colleague who does not say hello\n2. Select data: you only remember this time, forgetting the dozens of times they did greet you\n3. Add meaning: \"They have a problem with me\"\n4. Assume: \"I must have said something wrong yesterday\"\n5. Conclude: \"They do not like me\"\n6. Act: you start avoiding them\n\nAll of this happens in just a few seconds — and you hardly realize you are \"climbing the ladder.\"\n\nBut reality could be very different: they were wearing earbuds and simply did not hear you.\n\nThe Ladder of Inference explains why misunderstandings happen so frequently. The remedy is simple but effective: every time you are about to react strongly, pause and ask yourself: \"Which rung am I on? Am I basing this on real data, or just inference?\"" },
        { title: 'Defining Boundaries', text: "Every time you analyze a problem, you unconsciously draw a boundary: \"This is what I will consider; the rest I will ignore.\" This boundary determines how you understand and solve the problem.\n\nFor example, if you are a product manager and only look within the scope of \"my app,\" you will focus on optimizing the in-app experience. But if you expand to \"the entire customer journey,\" you might realize something important: the problem is not in the app — customers actually just need an automated email, not a new feature.\n\nNo boundary is absolutely \"right\" — only boundaries that are appropriate for the question you are trying to answer.\n\nThe important skill is not drawing a boundary once and being done, but knowing when to expand your view — and when to narrow it down to focus." },
        { title: 'Multiple Perspectives', text: "A very familiar scenario: sales says \"the product lacks features,\" engineering argues \"sales overpromised,\" finance worries \"costs are out of control,\" and the customer \"does not understand what the product is for.\"\n\nSo who is right? Actually, everyone is — but each person is only seeing one part of the picture.\n\nSame system, but from different positions, you see very different problems. A systems thinker does not rush to pick a side. They take an extra step: gathering different perspectives and piecing them together to understand the whole picture.\n\nA simple way to apply this: when analyzing a problem, ask yourself:\n\n\u2022 Who else is affected?\n\u2022 What do they see from their angle?\n\u2022 Why are they behaving the way they are?\n\nThe answers you get will often reveal things you had never considered before." },
      ],
      levelExamples: {
        beginner: "Your boss replies curtly — that is just a data point. But you interpret it as dissatisfaction, then jump further to conclude you might be fired. So you start worrying, maybe even looking for a new job... when in reality they were simply busy or in a rush.\n\nThe \"Ladder of Inference\" is exactly this chain of thinking from data to conclusion. If you learn to slow down and verify each step, you can avoid unnecessary negative inferences.",
        professional: "Defining Boundaries\n\nIf you only look within the scope of your own work, you easily fall into local optimization — doing your part well, but not necessarily helping the system improve.\n\nWhen you expand your view to the entire value chain — from the customer's real needs to the final outcome — you might realize something important: maybe you are solving the wrong problem, or optimizing the wrong thing.\n\nThe boundary you choose determines what you see — and from there, determines how you act. Knowing when to \"zoom out\" for the big picture is a major advantage of effective workers.",
        'middle-manager': "The same system, yet each department sees it differently: engineers see \"tech debt\" — temporary solutions and small bugs that accumulate, making future work harder; sales sees unmet customer needs; HR sees a burnt-out team; and finance sees costs exceeding budget.\n\nYour job is to combine these perspectives for a comprehensive view and effective decisions.",
        executive: "Look at the issue like an iceberg:\n\nSurface (Events): Revenue missed target\nPatterns: Sales cycle has been lengthening for 3 consecutive quarters\nStructure: Pricing model does not match how customers perceive and receive value\nDeepest layer (Mental Model): We are competing on features instead of focusing on the outcomes customers truly care about\n\nSystems thinking reminds you: the problem you see is just the tip. For lasting change, start from the deepest level — where the entire system above is shaped.",
        entrepreneur: "Look at the issue like an iceberg:\n\nSurface (Events): A major customer left\nPatterns: Customer satisfaction has been declining gradually over time\nStructure: You lack a systematic way to collect and process feedback\nDeepest layer (Mental Model): \"If the product is good enough, customers will stay on their own\"\n\nTo solve this at the root, you need to go back to the deepest layer — where assumptions are formed — and be willing to challenge the very way you think about customers and value.",

  {
    id: 4, title: 'System Mapping', subtitle: 'Make the invisible visible',
    icon: '🗺️', duration: '25 min', color: 'accent',
    content: {
      intro: "You already know how to \"think\" in systems — now it is time to learn how to \"draw\" them.\n\nWhy draw? Because systems are always more complex than what we can hold in our heads. When you put the relationships on paper (or a whiteboard), three important things happen:\n\n1. You start seeing connections you had previously overlooked\n2. The whole team can look at the same picture to discuss and align\n3. You identify the most effective intervention point, instead of spreading effort everywhere\n\nDo not worry if you are not used to drawing diagrams — everything can start from very simple shapes. What matters is not drawing beautifully, but drawing what is actually happening.",
      keyPoints: [
        { title: 'Causal Loop Diagram (CLD)', text: "This is the core tool of systems thinking — and it is surprisingly simple to use.\n\nYou start by listing variables (factors that can increase or decrease), then connect them with arrows to show relationships. Each arrow carries a sign:\n\n\u2022 (+): when this factor increases, the other also increases (or both decrease together)\n\u2022 (\u2013): when this factor increases, the other decreases (opposite direction)\n\nExample: Workload (+) \u2192 Stress (+) \u2192 Errors (+) \u2192 Rework (+) \u2192 Workload\n\nSince all signs are (+), this is a reinforcing loop — and it explains why burnout can self-amplify over time.\n\nThe power of a CLD is: once you draw it out, you are no longer just \"feeling\" the problem — you start seeing the structure behind it. And once you see the structure, you know where to intervene for real change." },
        { title: 'Stock & Flow Diagram', text: "In a system, some things change very slowly — because they are \"Stocks,\" like water in a bathtub. Examples: team knowledge, customer trust, or technical debt. These things cannot change instantly.\n\nInstead, you can only influence them through \"Flows\" — what goes in and what comes out of that stock.\n\nExample: customer trust (stock) is built gradually through each good experience (inflow), but can drop quickly after each incident (outflow).\n\nUnderstanding this makes you more realistic and patient. Big things like culture or reputation cannot \"change overnight\" because they are the result of a lot of accumulation over time. The only way is to adjust the small daily actions — so the flows change, and the stock gradually shifts." },
        { title: 'Connection Circle', text: "If causal loop diagrams feel a bit complex, start with the connection circle — a very simple but extremely effective approach for teamwork.\n\nHow to do it:\n\n1. Each person suggests important factors related to the problem, then write them in a circle\n2. Draw arrows showing how the factors influence each other\n3. Look for any loops that emerge\n\nDo not try to make it perfect from the start — getting it wrong is fine.\n\nThe real value is not in producing a \"correct\" diagram, but in the conversation that happens while drawing together. You will discover that each person sees the system differently — and when you combine their views, the overall picture becomes more complete and insightful than any individual perspective." },
        { title: 'Behavior Over Time Graph', text: "Before diving into complex diagrams, start with a very simple step: draw a graph showing how key factors change over time.\n\n\u2022 X-axis: time\n\u2022 Y-axis: value\n\nFor example, you could plot \"number of customers\" and \"satisfaction level\" over 12 months. If customers are growing but satisfaction is declining, that is a very clear signal: something is wrong in the underlying structure — perhaps you are growing faster than your capacity to serve.\n\nCommon graph patterns:\n\nExponential growth: a sign that a reinforcing loop is dominating\nOscillation: usually caused by a balancing loop with delay\nS-curve: growth then plateau when hitting a limit\nCollapse: negative reinforcing loop spiraling out of control\n\nEach pattern is not just a drawing — it is a \"clue\" telling you how the underlying system is operating." },
      ],
      levelExamples: {
        beginner: "Try viewing your own productivity as a system: energy \u2192 focus \u2192 work quality \u2192 manager feedback \u2192 motivation \u2192 back to energy.\n\nOnce you see this loop clearly, you understand that rest is not laziness — it is \"maintenance\" to keep your system running well.",
        professional: "Try \"drawing\" your own work dynamics as a loop:\n\nTask volume \u2192 Time pressure \u2192 Output quality \u2192 Client/partner feedback \u2192 Personal reputation \u2192 New opportunities \u2192 ...back to more tasks\n\nWhen you see the entire loop, you stop just trying to \"work faster\" and start seeing clearly which link is dragging down effectiveness — and where improvement is most needed.",
        'middle-manager': "Imagine team health as a loop: employee morale \u2192 productivity \u2192 customer experience \u2192 revenue \u2192 investment in people \u2192 back to employee morale.\n\nIdentify where the loop is weak or broken — that is exactly where your intervention will have the greatest impact.",
        executive: "Map the organizational operating dynamics as a chain:\n\nClear strategy \u2192 Organizational alignment \u2192 Execution speed \u2192 Market results \u2192 Board confidence \u2192 Resource allocation \u2192 Ability to invest in the next strategy.\n\nWhen everything is on the same picture, you immediately see where delays or misalignment are breaking the growth loop — allowing you to identify exactly where to intervene for smoother operation.",
        entrepreneur: "Map your growth engine:\n\nProduct quality \u2192 Customer satisfaction \u2192 Referrals \u2192 New customer acquisition \u2192 Revenue \u2192 Reinvestment in product \u2192 Product quality.\n\nWhen you see the entire chain, identify the weakest link. That is your bottleneck — focus your improvement efforts there to boost the entire system.",
      },
    },

  {
    id: 5, title: 'Leverage Points', subtitle: 'Where small changes produce big results',
    icon: '⚡', duration: '20 min', color: 'brand',
    content: {
      intro: "You already know how to see systems, and how to map them. Now comes the most important question: \"Where should I intervene?\"\n\nNot all intervention points are equal. Some changes consume enormous effort but make virtually no difference. Conversely, some small adjustments can shift an entire system.\n\nDonella Meadows — one of the founding thinkers of systems thinking — identified that intervention points (Leverage Points) have a clear hierarchy, from weak to powerful.\n\nOnce you understand this hierarchy, the way you make decisions changes completely: no longer doing more, but choosing the right place for the greatest impact.",
      keyPoints: [
        { title: 'Low Leverage: Parameters', text: "This is where most people start — and also why many efforts fail to create meaningful change.\n\nParameters are simply numbers: increase the budget by 10%, hire 3 more people, raise the KPI by 20%. Sounds logical, but in practice, systems often \"absorb\" these changes while overall behavior stays essentially the same.\n\nExample: a team is constantly working overtime. The familiar solution is to hire 2 more people. But new hires need time to ramp up, while existing staff must spend time mentoring. The result is that pressure does not decrease immediately — and a few months later, everything is back to the way it was.\n\nIt is like turning up the thermostat in a drafty room — you spend more energy but still do not solve the root problem." },
        { title: 'Medium Leverage: Feedback Loops', text: "Compared to just adjusting numbers, a much more effective approach is to change the flow of information — that is, to create new, strengthen, or weaken feedback loops in the system.\n\nWhen the right information reaches the right people at the right time, behavior changes on its own — no forcing required.\n\nExample: many hospitals did not used to publish infection rates. But when this data was made transparent, hospitals improved their processes on their own — no additional regulations needed. Information itself created a feedback loop that helped the system self-correct.\n\nAt work, you can apply this very practically: instead of only looking at final results (Lag Indicators), make leading indicators visible — what is happening right now.\n\nWhen the whole team can \"see\" how the system is operating, they will self-adjust their behavior — and that is what creates sustainable change." },
        { title: 'High Leverage: Rules & Structure', text: "Rules are the \"rules of the game\" in the system. Who has decision-making authority? What gets measured? What gets rewarded? These things silently shape everyone's behavior every day.\n\nWhen you change the rules, you do not need to force anyone to change — behavior changes on its own.\n\nA classic example from Toyota: they allowed any worker to stop the production line when they found a defect. Previously, only managers had this authority. Just one small rule change, but the impact was enormous — defects dropped, quality rose, and culture shifted from \"hiding problems\" to \"early detection.\"\n\nIn your organization, many things are actually \"rules\": promotion criteria, how performance is measured, or who has approval authority. These are what truly determine how the system operates — and also where the most powerful change happens if you intervene correctly." },
        { title: 'Highest Leverage: Mental Models', text: "This is the deepest level — and where the most powerful impact lies.\n\nMental models are the foundational beliefs that shape how you see the world. From there, everything else — rules, structures, behavior — is built upon them.\n\nWhen the mental model changes, the entire system changes with it.\n\nExamples:\n\n\u2022 When healthcare shifted from \"treating illness\" to \"preventing illness,\" the entire system had to change — research, policy, and public behavior\n\u2022 When education shifted from \"transmitting knowledge\" to \"developing capabilities,\" teaching, learning, and assessment methods all had to be redesigned\n\nThe core point is: when you change the question \"what are we really trying to do here?\", then all the answers downstream change too.\n\nThis is the most powerful lever — but also the hardest. Because most of the time, we do not realize we are operating under a specific mental model. And when you cannot see it, you cannot change it." },
      ],
      levelExamples: {
        beginner: "Low: Working overtime. Medium: Requesting weekly 1-on-1 feedback from your manager (new feedback loop). High: Proposing to change how success is measured — from hours worked to output delivered (rules). Highest: Shifting from \"I need to prove I'm busy\" to \"I need to create value.\"",
        professional: "Low: Adding more tools or documents to your workflow.\n\nMedium: Establishing clear measurements to identify which work truly creates value, based on real feedback.\n\nHigh: Shifting from evaluating based on work volume to evaluating based on results achieved and impact delivered.\n\nHighest: Changing mindset from just \"completing assigned tasks\" to \"solving the right problems for the customer or organization.\"",
        'middle-manager': "Low: Simply approving more overtime.\n\nMedium: Building a team dashboard focused on leading indicators instead of only lagging ones.\n\nHigh: Restructuring to shift focus from individual KPIs to team outcomes.\n\nHighest: Changing team identity from \"we just complete tasks\" to \"we own the outcomes.\"",
        executive: "Low: Just increase the budget.\n\nMedium: Build a board-level dashboard reflecting \"system health\" rather than just financials — creating a clearer feedback loop.\n\nHigh: Redesign incentive and reward mechanisms across the organization — changing the \"rules of the game\" to reshape behavior.\n\nHighest: Change the mental model — shift from maximizing shareholder value to creating value for all stakeholders, thereby completely redefining what \"success\" means for the organization.",
        entrepreneur: "Low: Increase ad spending.\n\nMedium: Establish a direct customer feedback loop into the product development process — for continuous improvement based on real data.\n\nHigh: Change the pricing approach from \"cost-plus-margin\" to value-based pricing — adjusting the \"rules of the game.\"\n\nHighest: Change the mental model — from \"we sell products\" to \"we solve problems\" — thereby redefining your entire business model and how you create value.",
      },

        { q: 'In a workplace, which intervention has the highest leverage?', opts: ['Hiring about 10% more staff for the team', 'Changing what success metrics are used and how rewards work', 'Upgrading all equipment and office facilities', 'Sending everyone to attend training courses'], correct: 1 },

  {
    id: 6, title: 'Practical Application', subtitle: 'From theory to daily practice',
    icon: '🚀', duration: '25 min', color: 'accent',
    content: {
      intro: "This is the most important module — because systems thinking only truly has value when you put it to use every day. The previous five modules gave you knowledge; this one helps you build the habit.\n\nThe goal is not to turn you into someone who draws complex diagrams, but to develop a natural reflex: before reacting to any problem, pause for a moment and ask yourself: \"What system is at play here?\"\n\nJust that one small shift is enough to significantly improve the quality of your decisions — from gut reactions to thoughtful analysis, from quick responses to understanding the true nature of things.",
      keyPoints: [
        { title: '5-Minute Systems Check', text: "This is one of the simplest yet most effective techniques you can apply right away. Before any important meeting, decision, or email, take 5 minutes to ask yourself four questions:\n\n1. \"What system am I in?\" — Helps you see the bigger picture, not get stuck in the immediate view.\n\n2. \"What feedback loops are at play?\" — Helps you understand why things are operating the way they currently are.\n\n3. \"Am I addressing a symptom or a root cause?\" — Avoids wasting effort on solutions that are only temporary.\n\n4. \"If I drew this out, what would it look like?\" — Forces you to think in terms of relationships and flows, rather than isolated events.\n\nAt first, this may feel like it slows you down. But after just a few weeks, it becomes a natural reflex. And then you will realize: those 5 minutes of thinking beforehand can save you hours of firefighting later." },
        { title: 'Designing Interventions', text: "You have identified the problem and drawn the big picture — the next step is designing a solution. The most important principle: a good intervention works with the system, not against it.\n\nSpecifically, you can start from these approaches:\n\n1. Leverage what is already working well — Find existing positive reinforcing loops and amplify them. Do not rush to build new things when the system already has something running effectively.\n\n2. Fill in missing feedback — Many problems stem from the right information not reaching the right people at the right time. Find which \"link\" is missing and fill it in.\n\n3. Reduce delays — If feedback takes too long, find ways to make it arrive faster. The speed of feedback often determines the quality of adjustment.\n\n4. Test small before going big — Do not roll out organization-wide immediately. Start with a small pilot, learn quickly, then scale.\n\n5. Watch for side effects — Systems always tend to react in ways you did not anticipate. So observe carefully for unintended consequences.\n\nAnd before each intervention, ask yourself one very important question: \"If this succeeds, what other loops might it accidentally trigger?\"" },
        { title: 'Systems Communication', text: "You may understand systems thinking very well, but if you cannot communicate it to others, your impact will be limited. The good news: you do not need to become a theory teacher. Just change the way you speak and the way you ask.\n\nInstead of using abstract concepts like \"balancing feedback loop,\" try something more relatable: \"This is like a thermostat — when it gets too hot it turns off, when it gets too cold it turns on.\" People will understand immediately without lengthy explanations.\n\nWhen presenting a problem, do not just talk — draw. Just 3-4 simple boxes on a whiteboard connected by arrows is enough for the whole room to see the connections. Things that seemed unrelated suddenly become clear — the kind of \"everyone knows but nobody has named it\" moment.\n\nAnd if there is one question you should bring to every discussion, it is: \"If we do this, what happens next? And then what?\"\n\nJust by asking the right question, you have already started leading people to think in systems." },
        { title: 'Building a Learning Organization', text: "The highest application of systems thinking is not solving a specific problem, but creating an organization that knows how to continuously learn and self-adjust.\n\nAnd the starting point is not far away — it is you.\n\n1. Change the question when problems arise — When things do not go as planned, instead of asking \"whose fault is it?\", ask \"what system produced this result?\" Gradually, your team will shift from blaming to curiosity and wanting to understand the root cause.\n\n2. Share how you think — Do not keep your system maps to yourself. When you share them openly, others do not just see the result but also learn how you see and approach problems.\n\n3. Reflect on structure, not just feelings — After each project, instead of just asking \"what went well, what did not?\", go deeper: \"what structure helped things go well?\" and \"what structure is getting in the way?\"\n\nThe interesting thing about systems thinking is that it spreads. When you start asking different questions, the thinking of people around you will gradually change too." },
      ],
      levelExamples: {
        beginner: "This week, before reacting to a problem at work, pause and ask: \"Is this an event, a pattern, or a structure?\" If something keeps going wrong, do not just fix it again — sketch the loop. Share it with a colleague. You will be surprised how much clarity a simple diagram can bring.",
        professional: "In your next project meeting, try a simple but very effective approach: draw a connection circle.\n\nStart from your team's decisions \u2192 how they affect the customer experience \u2192 how that impacts business metrics \u2192 then how those metrics loop back, affecting your team's priorities and resources.\n\nWhen you draw this loop, everything becomes much clearer.\n\nMore importantly, use it to explain things to stakeholders. Do not just say \"what we will do,\" but help them see \"why this matters in the big picture.\"\n\nWhen people understand the connections and the purpose behind them, alignment and decision-making become much easier.",
        'middle-manager': "In your next team meeting, try replacing \"Who is responsible?\" with \"What system is producing this result?\" and quickly sketch a feedback loop on the whiteboard.\n\nThis helps the team shift from blaming to curiosity, and from there, focus on proposing long-term structural improvements instead of just temporary fixes.",
        executive: "In your next strategy session, move beyond \"we need to do X\" to \"here is the system map — if we do X, which loops get activated? What unintended consequences might arise? Where are the delays?\" This transforms strategy from chess moves into system design.",
        entrepreneur: "Look at your business as a closed system:\n\nAttract customers \u2192 deliver service \u2192 create satisfaction \u2192 encourage referrals \u2192 back to attracting new customers.\n\nWhen you draw out this entire chain, identify the weakest link. Then ask yourself: am I just treating \"symptoms,\" or can I redesign the \"structure\" underneath?\n\nIn many cases, a structural change is far more valuable and impactful than numerous tactical adjustments.",
      },

function LanguageSwitcher({ lang, onChange }) {

function ProgressBar({ value, max, className = '' }) {
  const pct = Math.round((value / max) * 100);
  return (
    <div className={`w-full bg-brand-100 rounded-full h-3 ${className}`}>
      <div className="progress-bar bg-gradient-to-r from-brand-500 via-accent-500 to-pop-400 h-3 rounded-full shadow-sm" style={{ width: `${pct}%` }} />
    </div>
  );
}

function Badge({ children, color = 'brand' }) {
  const colors = {
    brand: 'bg-brand-100 text-brand-700',
    accent: 'bg-accent-100 text-accent-700',
    success: 'bg-green-100 text-green-700',
    warn: 'bg-amber-100 text-amber-700',
    gray: 'bg-gray-100 text-gray-600',
  };
  return <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${colors[color]}`}>{children}</span>;
}

function SoundToggle() {
  const [sfx, setSfx] = useState(() => { const s = localStorage.getItem('st-sfx'); return s === null ? true : s === 'true'; });
  const [music, setMusic] = useState(() => { const m = localStorage.getItem('st-music'); return m !== null && m === 'true'; });

  return (
    <div className="fixed top-3 right-3 z-50 flex gap-1 no-print">
      <button onClick={() => setSfx(SoundManager.toggleSfx())}
        className="w-8 h-8 rounded-full bg-white/80 backdrop-blur border border-gray-200 flex items-center justify-center text-sm hover:bg-gray-100 transition-all shadow-sm"
        title={sfx ? ui().soundOn : ui().soundOff}>
        {sfx ? '🔊' : '🔇'}
      </button>
      <button onClick={() => setMusic(SoundManager.toggleMusic())}
        className="w-8 h-8 rounded-full bg-white/80 backdrop-blur border border-gray-200 flex items-center justify-center text-sm hover:bg-gray-100 transition-all shadow-sm"
        title={music ? ui().musicOn : ui().musicOff}>
        {music ? '🎵' : '🎶'}
      </button>
    </div>
  );
}

function Button({ children, onClick, variant = 'primary', size = 'md', disabled = false, className = '' }) {
  const base = 'inline-flex items-center justify-center font-bold rounded-2xl transition-all focus:outline-none focus:ring-2 focus:ring-offset-2 active:scale-95';
  const variants = {
    primary: 'bg-gradient-to-r from-brand-600 via-brand-500 to-accent-500 text-white hover:shadow-xl hover:shadow-brand-500/25 focus:ring-brand-500 shadow-lg',
    secondary: 'bg-white text-brand-700 border-2 border-brand-200 hover:border-brand-400 hover:bg-brand-50 focus:ring-brand-500',
    success: 'bg-gradient-to-r from-mint-500 to-mint-400 text-white hover:shadow-lg hover:shadow-mint-500/25 focus:ring-mint-500 shadow-md',
    accent: 'bg-gradient-to-r from-accent-500 to-coral-400 text-white hover:shadow-lg hover:shadow-accent-500/25 focus:ring-accent-500 shadow-md',
    ghost: 'text-brand-600 hover:bg-brand-50 focus:ring-brand-500',

  const sizes = { sm: 'px-4 py-2 text-sm', md: 'px-6 py-3 text-sm', lg: 'px-10 py-4 text-base' };
  return (
