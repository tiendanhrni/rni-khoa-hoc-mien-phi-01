<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Khoá học miễn phí - Học viện RNI</title>
<meta name="description" content="Khoá học miễn phí - Học viện RNI" />

<meta property="og:type" content="website" />
<meta property="og:title" content="Khoá học miễn phí - Học viện RNI" />
<meta property="og:description" content="Khoá học miễn phí từ Học viện RNI" />

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Nunito:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Nunito', 'system-ui', 'sans-serif'],
        display: ['Space Grotesk', 'system-ui', 'sans-serif']
      },
      colors: {
        rni: {
          50:  '#fef2f2',
          100: '#fee2e2',
          200: '#fecaca',
          300: '#fca5a5',
          400: '#f87171',
          500: '#dc2626',
          600: '#9b1106',
          700: '#7f0e05',
          800: '#630b04',
          900: '#450803',
        },
        gold: {
          50:  '#fffbeb',
          100: '#fef3c7',
          200: '#fde68a',
          300: '#fcd34d',
          400: '#fbbf24',
          500: '#f59e0b',
          600: '#d97706',
        },
        cream: {
          50:  '#fdfbf7',
          100: '#faf5ec',
          200: '#f5ecd9',
        },
        ink: {
          900: '#1a1a1a',
          700: '#3a3a3a',
          500: '#6b6b6b',
        }
      }
    }
  }
}
</script>

<style>
  * { box-sizing: border-box; }
  body { font-family: 'Nunito', system-ui, sans-serif; }

  .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4,0,0.2,1); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .slide-up { animation: slideUp 0.6s cubic-bezier(0.4,0,0.2,1); }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .rni-bg {
    background: linear-gradient(135deg, #fdfbf7 0%, #faf5ec 50%, #fef2f2 100%);
  }
  .hero-gradient {
    background: linear-gradient(135deg, #9b1106 0%, #dc2626 50%, #f59e0b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .card-hover { transition: all 0.25s cubic-bezier(0.4,0,0.2,1); }
  .card-hover:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(155, 17, 6, 0.12);
  }

  .progress-bar { transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

  .kajabi-hidden {
    position: absolute;
    left: -9999px;
    top: -9999px;
    width: 1px;
    height: 1px;
    visibility: hidden;
    opacity: 0;
    pointer-events: none;
  }

  @media print {
    .no-print { display: none !important; }
  }
</style>
</head>
<body class="bg-white min-h-screen">
<div id="root"></div>

<iframe name="kajabi-submit-frame" class="kajabi-hidden" aria-hidden="true"></iframe>

<form id="kajabi-hidden-form"
      action="https://www.rni.institute/forms/2149179718/form_submissions"
      method="post"
      target="kajabi-submit-frame"
      class="kajabi-hidden"
      accept-charset="UTF-8">
  <input type="text" name="form_submission[name]" id="kajabi-name-field" value="" />
  <input type="email" name="form_submission[email]" id="kajabi-email-field" value="" />
</form>

<script type="text/babel">
const { useState, useEffect } = React;

function submitToKajabi(name, email) {
  try {
    const nameField = document.getElementById('kajabi-name-field');
    const emailField = document.getElementById('kajabi-email-field');
    const form = document.getElementById('kajabi-hidden-form');
    if (!nameField || !emailField || !form) {
      console.warn('[Kajabi] Khong tim thay form an');
      return;
    }
    nameField.value = name;
    emailField.value = email;
    form.submit();
    console.log('[Kajabi] Da gui dang ky:', name, email);
  } catch (err) {
    console.error('[Kajabi] Loi khi gui:', err);
  }
}

const LEVELS = [
  { id: 'beginner', icon: '🌱', name: 'Người mới', desc: 'Bắt đầu làm quen với chủ đề' },
  { id: 'intermediate', icon: '💼', name: 'Trung cấp', desc: 'Đã có kiến thức nền tảng' },
  { id: 'advanced', icon: '🎯', name: 'Nâng cao', desc: 'Muốn đào sâu và ứng dụng' },
];

const MODULES = [
  {
    id: 1,
    title: 'Bài 1: Tiêu đề bài học',
    subtitle: 'Mô tả ngắn',
    icon: '🔭',
    duration: '15 phút',
  },
];

function Button({ children, onClick, variant = 'primary', size = 'md', disabled = false, className = '' }) {
  const base = 'inline-flex items-center justify-center font-bold rounded-2xl transition-all active:scale-95';
  const variants = {
    primary: 'bg-gradient-to-r from-rni-600 to-rni-700 text-white hover:shadow-xl hover:shadow-rni-600/25 shadow-lg',
    secondary: 'bg-white text-rni-700 border-2 border-rni-200 hover:border-rni-400 hover:bg-rni-50',
    gold: 'bg-gradient-to-r from-gold-500 to-gold-600 text-white hover:shadow-lg shadow-md',
  };
  const sizes = { sm: 'px-4 py-2 text-sm', md: 'px-6 py-3 text-sm', lg: 'px-10 py-4 text-base' };
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
    >
      {children}
    </button>
  );
}

function ProgressBar({ value, max }) {
  const pct = Math.round((value / max) * 100);
  return (
    <div className="w-full bg-rni-100 rounded-full h-3">
      <div
        className="progress-bar bg-gradient-to-r from-rni-600 to-gold-500 h-3 rounded-full"
        style={{ width: `${pct}%` }}
      />
    </div>
  );
}

function Footer() {
  return (
    <footer className="mt-12 pb-4 px-4 text-center text-xs text-ink-500">
      <p>&copy; Học viện RNI</p>
    </footer>
  );
}

function App() {
  const [screen, setScreen] = useState('register');
  const [userName, setUserName] = useState('');
  const [userEmail, setUserEmail] = useState('');
  const [regName, setRegName] = useState('');
  const [regEmail, setRegEmail] = useState('');
  const [level, setLevel] = useState(null);
  const [progress, setProgress] = useState({});

  useEffect(() => {
    const savedName = localStorage.getItem('rni-user-name');
    const savedEmail = localStorage.getItem('rni-user-email');
    const savedLevel = localStorage.getItem('rni-level');
    const savedProgress = localStorage.getItem('rni-progress');
    if (savedName) setUserName(savedName);
    if (savedEmail) setUserEmail(savedEmail);
    if (savedLevel) setLevel(savedLevel);
    if (savedProgress) { try { setProgress(JSON.parse(savedProgress)); } catch(e) {} }
    if (savedName && savedEmail) {
      setScreen(savedLevel ? 'dashboard' : 'welcome');
    }
  }, []);

  useEffect(() => {
    localStorage.setItem('rni-progress', JSON.stringify(progress));
  }, [progress]);

  const handleRegister = () => {
    if (!regName.trim() || !regEmail.includes('@')) return;
    const name = regName.trim();
    const email = regEmail.trim();
    setUserName(name);
    setUserEmail(email);
    localStorage.setItem('rni-user-name', name);
    localStorage.setItem('rni-user-email', email);
    localStorage.setItem('rni-registered-at', new Date().toISOString());
    submitToKajabi(name, email);
    setScreen('welcome');
  };

  if (screen === 'register') {
    const canSubmit = regName.trim().length >= 2 && regEmail.includes('@');
    return (
      <div className="min-h-screen rni-bg flex items-center justify-center px-4">
        <div className="max-w-md w-full slide-up">
          <div className="text-center mb-8">
            <h1 className="font-display text-4xl font-black text-rni-700 mb-2">
              Học viện RNI
            </h1>
            <p className="text-ink-500">Đăng ký để bắt đầu khoá học miễn phí</p>
          </div>
          <div className="bg-white rounded-3xl shadow-lg p-8 space-y-5 border-2 border-rni-100">
            <div>
              <label className="block text-sm font-bold text-ink-700 mb-1.5">Họ và tên</label>
              <input
                type="text"
                value={regName}
                onChange={e => setRegName(e.target.value)}
                placeholder="Nguyễn Văn A"
                className="w-full rounded-xl border-2 border-rni-100 px-4 py-3 text-sm focus:ring-2 focus:ring-rni-600 focus:border-rni-600"
              />
              <p className="text-xs text-gold-600 mt-1.5">
                ⚠️ Tên này sẽ hiện trên chứng chỉ hoàn thành.
              </p>
            </div>
            <div>
              <label className="block text-sm font-bold text-ink-700 mb-1.5">Email</label>
              <input
                type="email"
                value={regEmail}
                onChange={e => setRegEmail(e.target.value)}
                placeholder="email@example.com"
                className="w-full rounded-xl border-2 border-rni-100 px-4 py-3 text-sm focus:ring-2 focus:ring-rni-600 focus:border-rni-600"
              />
              <p className="text-xs text-ink-500 mt-1.5">
                Chúng tôi sẽ gửi email xác nhận — hãy kiểm tra cả hộp spam.
              </p>
            </div>
            <Button onClick={handleRegister} disabled={!canSubmit} size="lg" className="w-full">
              Bắt đầu học 🎉
            </Button>
          </div>
        </div>
      </div>
    );
  }

  if (screen === 'welcome') {
    return (
      <div className="min-h-screen rni-bg">
        <div className="max-w-4xl mx-auto px-4 py-20 text-center slide-up">
          <h1 className="font-display text-5xl sm:text-7xl font-black text-ink-900 mb-4">
            Xin chào, {userName}!
          </h1>
          <h2 className="font-display text-3xl sm:text-5xl font-black hero-gradient mb-8">
            Sẵn sàng bắt đầu?
          </h2>
          <p className="text-lg text-ink-500 max-w-2xl mx-auto mb-10">
            Khoá học được thiết kế riêng bởi Học viện RNI — dễ hiểu, ứng dụng ngay.
          </p>
          <Button onClick={() => setScreen('level')} size="lg">
            Tiếp tục →
          </Button>
        </div>
        <Footer />
      </div>
    );
  }

  if (screen === 'level') {
    return (
      <div className="min-h-screen rni-bg">
        <div className="max-w-3xl mx-auto px-4 py-16">
          <div className="text-center mb-10 fade-in">
            <h2 className="font-display text-4xl font-black text-ink-900 mb-3">
              Bạn là ai?
            </h2>
            <p className="text-ink-500">Chọn cấp độ để chúng tôi cá nhân hoá nội dung</p>
          </div>
          <div className="grid gap-3">
            {LEVELS.map(lv => (
              <button
                key={lv.id}
                onClick={() => {
                  setLevel(lv.id);
                  localStorage.setItem('rni-level', lv.id);
                  setScreen('dashboard');
                }}
                className="bg-white rounded-2xl border-2 border-rni-100 hover:border-rni-600 p-5 text-left transition-all card-hover flex items-center gap-5"
              >
                <div className="text-4xl flex-shrink-0">{lv.icon}</div>
                <div className="flex-1">
                  <h3 className="font-bold text-ink-900 text-lg">{lv.name}</h3>
                  <p className="text-ink-500 text-sm">{lv.desc}</p>
                </div>
                <div className="text-rni-400 text-2xl">→</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  if (screen === 'dashboard') {
    const completed = MODULES.filter(m => (progress[m.id]?.assessment || 0) >= 60).length;
    return (
      <div className="min-h-screen rni-bg">
        <div className="bg-white/80 backdrop-blur border-b-2 border-rni-100 sticky top-0 z-10">
          <div className="max-w-5xl mx-auto px-4 py-4">
            <div className="flex items-center justify-between mb-2">
              <h1 className="font-display font-bold text-ink-900">📚 Học viện RNI</h1>
              <span className="text-sm font-bold text-rni-600">
                {completed}/{MODULES.length} hoàn thành
              </span>
            </div>
            <ProgressBar value={completed} max={MODULES.length} />
          </div>
        </div>
        <div className="max-w-5xl mx-auto px-4 py-8">
          <div className="grid gap-4">
            {MODULES.map(mod => (
              <button
                key={mod.id}
                className="bg-white rounded-2xl border-2 border-rni-100 hover:border-rni-600 p-6 text-left transition-all card-hover flex items-center gap-4"
              >
                <div className="w-14 h-14 bg-rni-50 rounded-2xl flex items-center justify-center text-2xl">
                  {mod.icon}
                </div>
                <div className="flex-1">
                  <h3 className="font-bold text-ink-900">{mod.title}</h3>
                  <p className="text-ink-500 text-sm">{mod.subtitle} · {mod.duration}</p>
                </div>
                <div className="text-rni-400">→</div>
              </button>
            ))}
          </div>
          <Footer />
        </div>
      </div>
    );
  }

  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
