// ── Helpers ───────────────────────────────────────────────────────────────────
const ALL_LESSONS = MODULES.flatMap(m => m.lessons.map(l => ({...l, moduleId:m.id})));

function getLessonIndex(lessonId) { return ALL_LESSONS.findIndex(l => l.id === lessonId); }
function isLessonUnlocked(lessonId, progress) {
  const idx = getLessonIndex(lessonId);
  if (idx === 0) return true;
  return !!progress[ALL_LESSONS[idx-1].id];
}

function Btn({children,onClick,variant='primary',size='md',disabled=false,className=''}) {
  const base='inline-flex items-center justify-center font-semibold rounded-xl transition-all focus:outline-none active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed';
  const V={
    primary:'bg-rni-600 text-white hover:bg-rni-700 shadow-md hover:shadow-lg',
    secondary:'bg-white text-rni-600 border-2 border-rni-200 hover:border-rni-400',
    gold:'bg-gradient-to-r from-gold-500 to-gold-400 text-white shadow-md hover:shadow-lg',
    ghost:'text-rni-600 hover:bg-rni-50',
    outline:'border-2 border-rni-600 text-rni-600 hover:bg-rni-50'
  };
  const S={sm:'px-4 py-2 text-xs',md:'px-5 py-2.5 text-sm',lg:'px-8 py-3.5 text-base'};
  return <button onClick={onClick} disabled={disabled} className={`${base} ${V[variant]} ${S[size]} ${className}`}>{children}</button>;
}

function PracticeBox({lessonId, practice}) {
  const storageKey = `rni-journal-${lessonId}`;
  const [text, setText]     = useState(()=> localStorage.getItem(storageKey) || '');
  const [saved, setSaved]   = useState(()=> !!localStorage.getItem(storageKey));
  const [editing, setEditing] = useState(false);

  if(!practice || practice.type==='text') return null;

  const handleSave = () => {
    if(!text.trim()) return;
    localStorage.setItem(storageKey, text);
    setSaved(true);
    setEditing(false);
  };

  const handleEdit = () => { setEditing(true); setSaved(false); };

  if(saved && !editing) return (
    <div className="bg-white rounded-2xl border-2 border-green-200 shadow-sm overflow-hidden fade-in">
      <div className="bg-green-50 px-5 py-3 flex items-center justify-between">
        <span className="text-sm font-bold text-green-700">✅ Ghi chép của bạn</span>
        <button onClick={handleEdit}
          className="text-xs text-green-600 hover:text-green-800 font-semibold border border-green-300 rounded-lg px-3 py-1 hover:bg-green-100 transition-all">
          ✏️ Chỉnh sửa
        </button>
      </div>
      <div className="px-5 py-4">
        <p className="text-gray-700 text-sm leading-relaxed whitespace-pre-line">{text}</p>
      </div>
    </div>
  );

  return (
    <div className="bg-white rounded-2xl border-2 border-rni-100 shadow-sm overflow-hidden">
      <div className="bg-rni-50 px-5 py-3">
        <span className="text-sm font-bold text-rni-700">✍️ Khung ghi chép của bạn</span>
        <p className="text-xs text-rni-500 mt-0.5">Viết ra những suy nghĩ chân thật — đây là không gian riêng của bạn.</p>
      </div>
      <div className="p-4">
        <textarea
          value={text}
          onChange={e=>setText(e.target.value)}
          placeholder={practice.placeholder || 'Ghi suy nghĩ của bạn ở đây...'}
          rows={8}
          className="w-full rounded-xl border-2 border-gray-200 px-4 py-3 text-sm text-gray-700 focus:ring-2 focus:ring-rni-400 focus:border-rni-400 outline-none transition-all resize-none leading-relaxed"
        />
        <div className="flex items-center justify-between mt-3">
          <p className="text-xs text-gray-400">{text.length} ký tự</p>
          <Btn onClick={handleSave} disabled={!text.trim()} size="sm">
            Lưu ghi chép ✓
          </Btn>
        </div>
      </div>
    </div>
  );
}

  const [qIdx, setQIdx]     = useState(0);
  const [sel, setSel]       = useState(null);
  const [shown, setShown]   = useState(false);
  const [correct, setCorrect] = useState(0);
  const [quizDone, setQuizDone] = useState(false);
  const [cheer, setCheer]   = useState('');
  const alreadyDone = !!progress[lesson.id];

  const q = lesson.quiz[qIdx];

  const pick = (i) => {
    if(shown) return;
    setSel(i); setShown(true);
    const isRight = i===q.correct;
    if(isRight) setCorrect(c=>c+1);
    setCheer(rnd(isRight ? CHEER_CORRECT : CHEER_WRONG));
  };

  const nextQ = () => {
    setShown(false); setSel(null); setCheer('');
    if(qIdx < lesson.quiz.length-1) { setQIdx(qIdx+1); }
    else {
      setQuizDone(true);
      const score = Math.round(((correct+(sel===q.correct?1:0))/lesson.quiz.length)*100);
      if(score>=50 && !alreadyDone) onComplete(lesson.id);
    }
  };

  const lastCorrect = correct + (sel===q?.correct ? 1 : 0);
  const finalScore  = lesson.quiz.length>0 ? Math.round((lastCorrect/lesson.quiz.length)*100) : 100;
  const passed      = finalScore>=50;

  const resetQuiz = () => { setQIdx(0); setSel(null); setShown(false); setCorrect(0); setQuizDone(false); setCheer(''); };

  const mod = MODULES.find(m=>m.lessons.some(l=>l.id===lesson.id));
  const noPQ = !!(mod?.noPracticeAndQuiz);
  const modIcon = mod?.icon || '🌸';

  return (
    <div className="min-h-screen hero-bg">
      {/* Top bar */}
      <div className="bg-white border-b border-rni-100 sticky top-0 z-20 no-print">
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center gap-3">
          <button onClick={onBack} className="flex items-center gap-1.5 text-rni-600 hover:text-rni-700 transition-colors text-sm font-semibold">
            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
            Quay lại danh sách
          </button>
          {alreadyDone && <span className="ml-auto text-xs bg-green-100 text-green-700 px-2.5 py-1 rounded-full font-semibold">✅ Đã hoàn thành</span>}
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-4 py-6 fade-in">
        {/* Lesson header banner */}
        <div className="bg-gradient-to-r from-rni-700 via-rni-600 to-rni-500 rounded-2xl p-6 mb-6 text-white relative overflow-hidden shadow-lg">
          <div className="absolute right-4 top-1/2 -translate-y-1/2 text-white/10 text-8xl font-black select-none">{modIcon}</div>
          <p className="text-white/70 text-xs font-semibold mb-1 uppercase tracking-wider">Module {mod?.id} · {mod?.title}</p>
          <h2 className="font-heading text-xl sm:text-2xl font-bold leading-snug relative z-10">{lesson.title}</h2>
        </div>

        {/* Tab Buttons */}
        {tab !== 'video' && !noPQ && (
          <div className="grid grid-cols-3 gap-3 mb-6">
            {[
              { k:'video',    icon:'📽', label:'Video',       sublabel:'Bài giảng' },
              { k:'quiz',     icon:'📝', label:'Trắc nghiệm', sublabel:'Ôn lại kiến thức' },
              { k:'practice', icon:'🌱', label:'Thực hành',   sublabel:'Áp dụng ngay' },
            ].map(({k,icon,label,sublabel})=>(
              <button key={k} onClick={()=>setTab(k)}
                className={`rounded-2xl p-4 text-center transition-all border-2 ${
                  tab===k
                    ? 'bg-rni-600 border-rni-600 text-white shadow-lg scale-[1.02]'
                    : 'bg-white border-gray-200 text-gray-500 hover:border-rni-300 hover:text-rni-600'
                }`}>
                <div className="text-2xl mb-1">{icon}</div>
                <div className={`font-bold text-sm ${tab===k?'text-white':'text-gray-700'}`}>{label}</div>
                <div className={`text-xs mt-0.5 ${tab===k?'text-white/75':'text-gray-400'}`}>{sublabel}</div>
              </button>
            ))}
          </div>
        )}

        {/* ── VIDEO TAB ── */}
        {tab==='video' && (
          <div className="fade-in space-y-4">
            {lesson.desc && (
              <div className="bg-white rounded-2xl border border-gray-100 p-4 shadow-sm">
                <p className="text-sm text-gray-700 leading-relaxed">{lesson.desc}</p>
              </div>
            )}
            {lesson.videoId ? (
              <div className="video-wrap shadow-md">
                <iframe
                  src={`https://www.youtube.com/embed/${lesson.videoId}?rel=0&modestbranding=1&iv_load_policy=3&fs=1&disablekb=0&showinfo=0`}
                  title={lesson.title}
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope"
                  allowFullScreen/>
              </div>
            ) : lesson.videoUrl ? (
              <div className="bg-rni-50 border-2 border-rni-200 rounded-2xl p-8 text-center">
                <div className="text-4xl mb-3">🎬</div>
                <h3 className="font-bold text-gray-800 mb-2">{lesson.title}</h3>
                <p className="text-gray-500 text-sm mb-5">Video được lưu trữ trên trang RNI Institute. Nhấn để xem đầy đủ.</p>
                <a href={lesson.videoUrl} target="_blank" rel="noopener"><Btn size="lg">Xem Video →</Btn></a>
              </div>
            ) : (
              <div className="bg-gray-100 rounded-2xl p-8 text-center">
                <div className="text-4xl mb-3">⏳</div>
                <p className="text-gray-500 text-sm">Video đang được chuẩn bị, sẽ cập nhật sớm nhé!</p>
              </div>
            )}

            {/* ── CHAT BUTTON dưới video ── */}
            <ChatButton />

            {/* Nút tiếp theo */}
            <div className="flex justify-end">
              {noPQ ? (
                <div className="flex gap-3">
                  {alreadyDone
                    ? <Btn onClick={onBack}>← Tiếp tục hành trình</Btn>
                    : <Btn onClick={()=>{onComplete(lesson.id); onBack();}}>Tiếp theo ✓</Btn>
                  }
                </div>
              ) : (
                <Btn onClick={()=>setTab('quiz')}>Tiếp theo →</Btn>
              )}
            </div>
          </div>
        )}

        {/* ── QUIZ TAB ── */}
        {tab==='quiz' && (
          <div className="fade-in space-y-4">
            {!quizDone && qIdx===0 && !shown && (
              <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5">
                <h3 className="font-bold text-amber-800 text-base mb-2">📝 Ôn lại kiến thức</h3>
                <p className="text-amber-700 text-sm leading-relaxed mb-2">
                  Đây là bước quan trọng giúp bạn <strong>nội hóa kiến thức</strong> từ bài giảng vào tư duy của mình.
                </p>
                <ul className="text-amber-700 text-sm space-y-1">
                  <li>✦ Bài có <strong>{lesson.quiz.length} câu hỏi</strong></li>
                  <li>✦ Cần đúng <strong>≥ 50%</strong> để mở khoá bài tiếp theo</li>
                  <li>✦ Có thể làm lại nhiều lần nếu chưa đạt</li>
                </ul>
              </div>
            )}

            {!quizDone ? (
              <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
                <div className="flex items-center justify-between mb-3">
                  <span className="text-xs font-bold text-rni-600 bg-rni-50 px-3 py-1.5 rounded-full">
                    Câu {qIdx+1} / {lesson.quiz.length}
                  </span>
                  <span className="text-xs text-gray-400">{correct} đúng · cần ≥ 50%</span>
                </div>
                <ProgressBar value={qIdx+1} max={lesson.quiz.length} className="mb-5"/>
                <h4 className="font-semibold text-base text-gray-800 mb-4 leading-relaxed">{q.q}</h4>
                <div className="space-y-3">
                  {q.opts.map((opt,i)=>(
                    <button key={i} onClick={()=>pick(i)}
                      className={`w-full text-left p-4 rounded-xl border-2 text-sm transition-all ${
                        shown
                          ? i===q.correct ? 'border-green-400 bg-green-50 font-medium'
                          : i===sel ? 'border-red-400 bg-red-50'
                          : 'border-gray-200 opacity-40'
                          : 'border-gray-200 hover:border-rni-300 hover:bg-rni-50 cursor-pointer'
                      }`}>
                      <span className={`inline-flex w-7 h-7 rounded-full border-2 mr-3 items-center justify-center text-xs font-bold flex-shrink-0 align-middle ${
                        shown
                          ? i===q.correct ? 'border-green-500 bg-green-500 text-white'
                          : i===sel ? 'border-red-500 bg-red-500 text-white'
                          : 'border-gray-300 text-gray-400'
                          : 'border-gray-300 text-gray-500'
                      }`}>{String.fromCharCode(65+i)}</span>
                      {opt}
                    </button>
                  ))}
                </div>
                {shown && (
                  <div className="mt-5 space-y-3 fade-in">
                    <div className={`rounded-xl p-4 text-sm font-semibold ${sel===q.correct?'bg-green-50 text-green-800 border border-green-200':'bg-amber-50 text-amber-800 border border-amber-200'}`}>
                      <div className="mb-1">{cheer}</div>
                      {sel!==q.correct && <div className="text-xs font-normal mt-1">💡 Đáp án đúng: <strong>{q.opts[q.correct]}</strong></div>}
                    </div>
                    <Btn onClick={nextQ} className="w-full">
                      {qIdx<lesson.quiz.length-1 ? 'Câu tiếp theo →' : 'Xem kết quả 🎯'}
                    </Btn>
                  </div>
                )}
              </div>
            ) : (
              <div className="text-center fade-in space-y-5">
                <div className={`w-28 h-28 rounded-full mx-auto flex items-center justify-center text-3xl font-black shadow-xl ${passed?'bg-gradient-to-br from-green-400 to-green-600 text-white':'bg-gradient-to-br from-amber-400 to-amber-600 text-white'}`}>
                  {finalScore}%
                </div>
                <div>
                  <h3 className="font-heading text-2xl font-bold mb-2">
                    {passed ? '🌟 Xuất sắc! Bạn đã vượt qua!' : '💪 Gần rồi! Thử lại nha!'}
                  </h3>
                  <p className="text-gray-500 text-sm max-w-sm mx-auto">
                    {passed
                      ? 'Tuyệt vời lắm! Kiến thức đã thấm sâu vào tư duy của bạn rồi. Hãy tiếp tục với phần thực hành để chuyển hoá nó thành hành động! 🌸'
                      : 'Không sao cả — mỗi lần làm lại là một lần hiểu sâu hơn. Hãy xem lại video và thử lần nữa nhé! 💗'}
                  </p>
                </div>
                <div className="flex gap-3 justify-center flex-wrap">
                  {passed && <Btn onClick={()=>setTab('practice')}>Đến phần Thực hành 🌱</Btn>}
                  <Btn variant="secondary" onClick={resetQuiz}>🔄 Làm lại</Btn>
                  {!passed && <Btn variant="ghost" onClick={()=>setTab('video')}>📽 Xem lại video</Btn>}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── PRACTICE TAB ── */}
        {tab==='practice' && (
          <div className="fade-in space-y-4">
            {(noPQ || !lesson.practice) ? (
              <div className="bg-amber-50 border border-amber-200 rounded-2xl p-6 text-center">
                <div className="text-3xl mb-3">🎬</div>
                <h3 className="font-bold text-amber-800 mb-2">Module này không có phần thực hành</h3>
                <p className="text-amber-700 text-sm mb-4">Hãy xem video và hoàn thành trắc nghiệm để mở khoá bài tiếp theo nhé!</p>
                <Btn variant="secondary" onClick={()=>setTab('quiz')}>Đến phần trắc nghiệm →</Btn>
              </div>
            ) : (
              <>
                {lesson.practice.type !== 'text' && (
                  <div className="bg-gradient-to-br from-rni-50 to-amber-50 border border-rni-100 rounded-2xl p-5">
                    <h3 className="font-bold text-rni-700 text-base mb-2">🌱 Thực hành — bước chuyển hoá quan trọng nhất</h3>
                    <p className="text-gray-600 text-sm leading-relaxed">
                      Kiến thức chỉ thực sự trở thành của bạn khi được đưa vào thực tế. Hãy dành vài phút yên tĩnh để thực hành bài tập dưới đây — không cần hoàn hảo, chỉ cần chân thật với chính mình. 💗
                    </p>
                  </div>
                )}

                <div className="bg-white rounded-2xl border border-gray-200 shadow-sm p-6">
                  <div className="flex items-center gap-2 mb-4">
                    <span className="text-2xl">{lesson.practice.type==='text' ? '🧘' : '✍️'}</span>
                    <h4 className="font-bold text-gray-800">Bài tập thực hành</h4>
                  </div>
                  <p className="text-gray-700 leading-relaxed text-sm">{lesson.practice.prompt}</p>
                </div>

                <PracticeBox lessonId={lesson.id} practice={lesson.practice}/>

                {(alreadyDone || passed) ? (
                  <div className="text-center bounce-in space-y-4">
                    <div className="bg-gradient-to-br from-green-50 to-emerald-50 border border-green-200 rounded-2xl p-6">
                      <div className="text-4xl mb-3">🎉</div>
                      <h3 className="font-bold text-green-800 text-lg mb-1">Bạn đã hoàn thành bài học này!</h3>
                      <p className="text-green-700 text-sm">Mỗi bước nhỏ bạn đi hôm nay đều đang thắp sáng thêm ngọn hải đăng bên trong. Hãy tiếp tục nhé! 🌟</p>
                    </div>
                    <Btn onClick={onBack} size="lg">← Tiếp tục hành trình</Btn>
                  </div>
                ) : (
                  <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-center">
                    <p className="text-amber-700 text-sm">💡 Hoàn thành bài <strong>trắc nghiệm đạt ≥ 50%</strong> để mở khoá bài tiếp theo.</p>
                    <button onClick={()=>setTab('quiz')} className="mt-2 text-rni-600 text-sm font-semibold hover:underline">Đến phần trắc nghiệm →</button>
                  </div>
                )}
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── CELEBRATION POPUP ─────────────────────────────────────────────────────────
function CelebrationPopup({onCert}) {
  const [visible, setVisible] = useState(true);
  if (!visible) return null;
  return (
    <div
      className="fixed inset-0 z-50 flex items-center justify-center p-4"
      style={{background:'rgba(0,0,0,0.65)'}}
      onClick={(e)=>{ if(e.target===e.currentTarget) setVisible(false); }}
    >
      <div className="relative bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden bounce-in">
        {/* Confetti top bar */}
        <div style={{background:'linear-gradient(135deg,#9b1106 0%,#c41a0a 60%,#f59e0b 100%)'}} className="px-6 pt-8 pb-6 text-white text-center relative overflow-hidden">
          {/* Decorative circles */}
          <div className="absolute -top-8 -left-8 w-32 h-32 rounded-full opacity-10" style={{background:'#fff'}}/>
          <div className="absolute -bottom-6 -right-6 w-24 h-24 rounded-full opacity-10" style={{background:'#fff'}}/>
          <div className="text-6xl mb-3 float">🎉</div>
          <h2 className="font-heading text-2xl font-black mb-1 leading-tight">Chúc mừng bạn!</h2>
          <p className="text-white/85 text-sm leading-relaxed">Bạn đã hoàn thành toàn bộ khoá học<br/><strong>Dưỡng Tâm Cùng Khai Vấn Tỉnh Thức</strong></p>
        </div>
        {/* Body */}
        <div className="px-6 py-6 text-center">
          <div className="flex justify-center gap-5 mb-5">
            {[
              {icon:'🌟', label:'Tất cả bài học'},
              {icon:'📝', label:'Trắc nghiệm'},
              {icon:'🌱', label:'Thực hành'},
            ].map((item,i)=>(
              <div key={i} className="flex flex-col items-center gap-1">
                <div className="w-12 h-12 bg-green-50 border-2 border-green-200 rounded-xl flex items-center justify-center text-2xl">{item.icon}</div>
                <span className="text-xs text-gray-500 font-medium">{item.label}</span>
              </div>
            ))}
          </div>
          <p className="text-gray-600 text-sm leading-relaxed mb-5">
            Mỗi bước bạn đi hôm nay đang thắp sáng thêm ngọn hải đăng bên trong. Hành trình dưỡng tâm của bạn không dừng lại ở đây! 🌸
          </p>
          <Btn onClick={onCert} size="lg" className="w-full pulse-btn mb-3">
            🏆 Nhận Chứng Chỉ Của Bạn
          </Btn>
          <button onClick={()=>setVisible(false)} className="text-xs text-gray-400 hover:text-gray-600 transition-colors">
            Xem lại sau
          </button>
        </div>
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({userName, progress, onLesson, onCert}) {
  const totalLessons = ALL_LESSONS.length;
  const done = ALL_LESSONS.filter(l=>progress[l.id]).length;
  const allDone = done===totalLessons;

  return (
    <div className="min-h-screen hero-bg">
      <div className="bg-white border-b border-rni-100 sticky top-0 z-20 no-print">
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="bg-rni-600 rounded-xl p-1.5 flex-shrink-0">
              <Logo className="h-7 w-auto"/>
            </div>
            <div>
              <h1 className="font-display text-sm font-bold text-gray-900 leading-tight">Dưỡng Tâm Cùng Khai Vấn Tỉnh Thức</h1>
            </div>
          </div>
          <span className="text-sm font-semibold text-rni-600 flex-shrink-0">{done}/{totalLessons}</span>
        </div>
        <div className="max-w-3xl mx-auto px-4 pb-2.5">
          <ProgressBar value={done} max={totalLessons}/>
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-4 py-6">
        <div className="mb-6 fade-in">
          <h2 className="font-heading text-2xl font-bold text-gray-900">Xin chào, {userName}! 🌸</h2>
          <p className="text-gray-500 text-sm mt-1">Tiếp tục hành trình khai vấn tỉnh thức dưỡng tâm của bạn.</p>
        </div>

        {allDone && <CelebrationPopup onCert={onCert} />}
        {allDone && (
          <div className="bg-gradient-to-r from-rni-700 to-rni-600 rounded-2xl p-5 text-white mb-6 bounce-in shadow-xl border-2 border-gold-400">
            <div className="flex items-center gap-3 mb-3">
              <span className="text-3xl">🏆</span>
              <div>
                <h3 className="font-heading text-base font-bold">Bạn đã hoàn thành toàn bộ khoá học!</h3>
                <p className="text-white/80 text-xs mt-0.5">Chứng chỉ của bạn đã sẵn sàng.</p>
              </div>
            </div>
            <Btn variant="gold" onClick={onCert} className="w-full pulse-btn">Nhận Chứng Chỉ Của Bạn 🏆</Btn>
          </div>
        )}

        <div className="space-y-5">
          {MODULES.map(mod=>{
            const modDone = mod.lessons.filter(l=>progress[l.id]).length;
            const modTotal = mod.lessons.length;
            return (
              <div key={mod.id} className="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden fade-in">
                <div className="bg-gradient-to-r from-rni-600 to-rni-700 px-5 py-4 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <span className="text-2xl">{mod.icon}</span>
                    <div>
                      <p className="text-xs text-white/70 font-medium">Module {mod.id}</p>
                      <h3 className="font-display text-base font-bold text-white leading-snug">{mod.title}</h3>
                    </div>
                  </div>
                  <span className="text-xs text-white/80 bg-white/20 px-2.5 py-1 rounded-full flex-shrink-0">
                    {modDone}/{modTotal}
                  </span>
                </div>
                <div className="divide-y divide-gray-100">
                  {mod.lessons.map((lesson,li)=>{
                    const isDone   = !!progress[lesson.id];
                    const unlocked = isLessonUnlocked(lesson.id, progress);
                    const isCur    = unlocked && !isDone;
                    return (
                      <button key={lesson.id} onClick={()=>{if(unlocked) onLesson(lesson);}}
                        disabled={!unlocked}
                        className={`w-full flex items-center gap-4 px-5 py-4 text-left transition-all ${unlocked?'hover:bg-rni-50 cursor-pointer':' module-locked cursor-not-allowed'}`}>
                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0 ${isDone?'bg-green-100':isCur?'bg-rni-100':'bg-gray-100'}`}>
                          {!unlocked?'🔒':isDone?'✅':'▶'}
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className={`text-sm font-semibold truncate ${isCur?'text-rni-600':isDone?'text-green-700':'text-gray-700'}`}>
                            {lesson.title}
                          </p>
                          {isDone && <p className="text-xs text-green-600 mt-0.5">Đã hoàn thành</p>}
                          {isCur  && <p className="text-xs text-rni-500 mt-0.5 font-medium">→ Tiếp tục học</p>}
                          {!unlocked && <p className="text-xs text-gray-400 mt-0.5">Hoàn thành bài trước để mở khoá</p>}
                        </div>
                        {unlocked && <span className="text-gray-300 text-lg flex-shrink-0">›</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        <footer className="mt-10 pb-4 text-center no-print">
          <div className="flex items-center justify-center gap-4 text-xs text-gray-400 flex-wrap">
            <span>© Học viện RNI</span>
            <a href="https://www.rni.institute/" target="_blank" rel="noopener" className="hover:text-rni-600">rni.institute</a>
            <a href="https://www.facebook.com/IamRubyNguyen" target="_blank" rel="noopener" className="hover:text-rni-600">Facebook</a>
            <a href="https://www.youtube.com/@RubyNguyenInspirer" target="_blank" rel="noopener" className="hover:text-rni-600">YouTube</a>

function CertScreen({userName, onBack}) {
  const canvasRef = useRef(null);
  const [rendered, setRendered] = useState(false);

  useEffect(()=>{
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const img = new window.Image();
    img.onload = () => {
      canvas.width  = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      const nameY = Math.round(img.height * 0.515);
      const centerX = img.width / 2;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const fontSize = Math.round(img.width * 0.072);
      ctx.font = `bold ${fontSize}px 'Cormorant Garamond', 'Times New Roman', serif`;
      ctx.fillStyle = '#9b1106';
      ctx.letterSpacing = '2px';
      ctx.shadowColor = 'rgba(155,17,6,0.08)';
      ctx.shadowBlur = 8;
      ctx.fillText(userName || '', centerX, nameY);
      ctx.shadowBlur = 0;
      setRendered(true);
    };
    img.src = CERT_IMG_SRC;
  },[userName]);

  const handlePrint = () => {
    const canvas = canvasRef.current;
    if(!canvas) return;
    const dataUrl = canvas.toDataURL('image/png');
    const win = window.open('','_blank');
    win.document.write(`
      <html><head><title>Chứng chỉ - ${userName}</title>
      <style>
        @page { margin: 0; size: A4 portrait; }
        body { margin: 0; padding: 0; }
        img { width: 100%; height: auto; display: block; }
      </style></head>
      <body><img src="${dataUrl}" onload="window.print();window.close();"/></body>
      </html>
    `);
    win.document.close();
  };

  const handleDownload = () => {
    const canvas = canvasRef.current;
    if(!canvas) return;
    const dataUrl = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `Chung-chi-${(userName||'hoc-vien').replace(/\s+/g,'-')}.png`;
    a.click();
  };

  return (
    <div className="min-h-screen hero-bg py-8 px-4">
      <div className="max-w-lg mx-auto">
        <button onClick={onBack} className="flex items-center gap-2 text-rni-600 hover:text-rni-700 mb-6 text-sm font-semibold no-print">
          <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
          Quay lại
        </button>

        <div className="rounded-2xl shadow-xl overflow-hidden mb-6 border border-gray-200">
          <canvas ref={canvasRef} style={{width:'100%', height:'auto', display:'block'}}/>
        </div>

        <div className="flex gap-3 justify-center mb-10 no-print flex-wrap">
          <Btn onClick={handleDownload} variant="primary" size="lg">
            ⬇️ Tải về (.png)
          </Btn>
          <Btn onClick={handlePrint} variant="secondary" size="lg">
            🖨️ In Chứng Chỉ
          </Btn>
          <Btn onClick={onBack} variant="ghost" size="md">← Quay lại</Btn>
        </div>

        <div className="no-print space-y-6">
          <div className="bg-gradient-to-br from-rni-50 to-amber-50 border border-rni-100 rounded-2xl p-6">
            <p className="text-gray-700 text-sm leading-relaxed mb-5">
              Hành trình phát triển và vun bồi bản thân của mỗi người là một hành trình không ngừng nghỉ. Khi bạn có sự trưởng thành và vững chãi về nội tâm, bạn sẽ tự tháo gỡ được những khó khăn và làm chủ cuộc đời. Qua đó sự chuyển hoá trong các mối quan hệ, sự nghiệp, sức khoẻ và đặc biệt là chính mình sẽ tự thay đổi theo.
            </p>
            <p className="text-gray-700 text-sm leading-relaxed mb-5">
              Trên hành trình phát triển đó, khi có công cụ và người dẫn dắt đồng hành, lối đi của bạn sẽ sáng rõ hơn. Đó là sứ mệnh của Học viện RNI.
            </p>
            <div className="text-center">
              <p className="text-sm font-semibold text-rni-700 mb-3">Nếu bạn muốn tìm hiểu sâu hơn về lộ trình, hãy liên hệ đội ngũ hỗ trợ của Học viện RNI:</p>
              <a href="https://www.rni.institute/dat-lich-coaching-1-1" target="_blank" rel="noopener">
                <Btn size="lg" className="pulse-btn">📅 Đặt lịch Coaching 1-1</Btn>
              </a>
            </div>
          </div>

          <div>

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App() {
  const [screen,  setScreen]  = useState('register');
  const [userName,setUserName]= useState('');
  const [lesson,  setLesson]  = useState(null);
  const [progress,setProgress]= useState(()=>{
    try{return JSON.parse(localStorage.getItem('rni-kvtt-progress')||'{}');}catch{return{};}
  });

  useEffect(()=>{localStorage.setItem('rni-kvtt-progress',JSON.stringify(progress));},[progress]);

  useEffect(()=>{
    const n=localStorage.getItem('rni-kvtt-name');
    if(n){setUserName(n);setScreen('dashboard');}
  },[]);

  const done = (id) => setProgress(p=>({...p,[id]:true}));

  if(screen==='register') return <RegisterScreen onDone={(n,e)=>{
    setUserName(n);
    localStorage.setItem('rni-kvtt-name',n);
    localStorage.setItem('rni-kvtt-email',e);
    setScreen('welcome');
  }}/>;
  if(screen==='welcome')  return <WelcomeScreen userName={userName} onStart={()=>setScreen('dashboard')}/>;
  if(screen==='cert')     return <CertScreen userName={userName} onBack={()=>setScreen('dashboard')}/>;
  if(screen==='lesson' && lesson) return <LessonView lesson={lesson} progress={progress} onComplete={done} onBack={()=>{setLesson(null);setScreen('dashboard');}}/>;

  return <Dashboard userName={userName} progress={progress}
    onLesson={l=>{setLesson(l);setScreen('lesson');}}
    onCert={()=>setScreen('cert')}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
