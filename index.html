function ProgressBar({ value, max }) {
  const pct = Math.round((value / max) * 100);
  return (
    <div className="w-full bg-rni-100 rounded-full h-2.5">
      <div className="progress-bar bg-gradient-to-r from-rni-600 to-gold-500 h-2.5 rounded-full" style={{ width: `${pct}%` }} />
    </div>
  );
}

function Button({ children, onClick, variant = 'primary', size = 'md', disabled = false, className = '' }) {
  const base = 'inline-flex items-center justify-center font-semibold rounded-xl transition-all focus:outline-none active:scale-95';
  const variants = {
    primary: 'bg-rni-600 text-white hover:bg-rni-700 shadow-lg hover:shadow-xl',
    secondary: 'bg-white text-rni-600 border-2 border-rni-200 hover:border-rni-400 hover:bg-rni-50',
    gold: 'bg-gradient-to-r from-gold-500 to-gold-400 text-white hover:shadow-lg shadow-md',
    ghost: 'text-rni-600 hover:bg-rni-50',
  };
  const sizes = { sm: 'px-4 py-2 text-sm', md: 'px-6 py-3 text-sm', lg: 'px-8 py-4 text-base' };
  return (
    <button onClick={onClick} disabled={disabled}
      className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}>
      {children}
    </button>
  );
}

// LESSON VIEW
// ============================================================
function LessonView({ lesson, onComplete, onBack }) {
  const [quizStarted, setQuizStarted] = useState(false);
  const [currentQ, setCurrentQ] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showAnswer, setShowAnswer] = useState(false);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);

  const q = lesson.quiz[currentQ];

  const selectAnswer = (idx) => {
    if (showAnswer) return;
    setSelected(idx);
    setShowAnswer(true);
    if (idx === q.correct) setScore(s => s + 1);
  };

  const nextQ = () => {
    setShowAnswer(false);
    setSelected(null);
    if (currentQ < lesson.quiz.length - 1) {
      setCurrentQ(currentQ + 1);
    } else {
      setFinished(true);
      const pct = Math.round(((score + (selected === q.correct ? 1 : 0)) / lesson.quiz.length) * 100);
      if (pct >= 60) onComplete();
    }
  };

  const finalScore = Math.round(((score) / lesson.quiz.length) * 100);
  const passed = finalScore >= 60;

  return (
    <div className="fade-in max-w-3xl mx-auto">
      <button onClick={onBack} className="flex items-center gap-2 text-rni-600 hover:text-rni-700 mb-6 text-sm font-semibold">
        ← Quay lại danh sách
      </button>

      <div className="bg-white rounded-2xl shadow-lg border border-rni-100 overflow-hidden mb-6">
        <div className="bg-rni-600 px-6 py-5 text-white">
          <div className="text-3xl mb-2">{lesson.icon}</div>
          <h2 className="font-display text-xl sm:text-2xl font-bold">Bài {lesson.id}: {lesson.title}</h2>
          <p className="text-white/70 text-sm mt-1">⏱ {lesson.duration}</p>
        </div>

        {/* Video */}
        <div className="p-4 sm:p-6">
          <div className="video-container bg-gray-100">
            <iframe
              src={`https://www.youtube.com/embed/${lesson.videoId}`}
              title={lesson.title}
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowFullScreen
            />
          </div>
        </div>
      </div>

      {/* Quiz Section */}
      {!quizStarted && !finished && (
        <div className="bg-white rounded-2xl shadow-sm border border-rni-100 p-6 text-center fade-in">
          <div className="text-3xl mb-3">📝</div>
          <h3 className="font-bold text-lg mb-2">Bài tập kiểm tra</h3>
          <p className="text-gray-500 text-sm mb-4">Trả lời đúng để mở khoá bài tiếp theo</p>
          <Button onClick={() => setQuizStarted(true)}>Bắt đầu kiểm tra →</Button>
        </div>
      )}

      {quizStarted && !finished && (
        <div className="bg-white rounded-2xl shadow-sm border border-rni-100 p-6 fade-in">
          <div className="flex items-center justify-between mb-4">
            <span className="text-xs font-semibold text-rni-600 bg-rni-50 px-3 py-1 rounded-full">
              Câu {currentQ + 1}/{lesson.quiz.length}
            </span>
          </div>
          <h4 className="font-bold text-base mb-4">{q.q}</h4>
          <div className="space-y-3">
            {q.opts.map((opt, i) => (
              <button key={i} onClick={() => selectAnswer(i)}
                className={`w-full text-left p-4 rounded-xl border-2 text-sm transition-all ${
                  showAnswer
                    ? i === q.correct ? 'border-green-400 bg-green-50' : i === selected ? 'border-red-400 bg-red-50' : 'border-gray-200 opacity-50'
                    : 'border-gray-200 hover:border-rni-300 hover:bg-rni-50'
                }`}>
                <div className="flex items-center gap-3">
                  <span className={`w-7 h-7 rounded-full border-2 flex items-center justify-center text-xs font-bold flex-shrink-0 ${
                    showAnswer
                      ? i === q.correct ? 'border-green-500 bg-green-500 text-white' : i === selected ? 'border-red-500 bg-red-500 text-white' : 'border-gray-300'
                      : 'border-gray-300'
                  }`}>{String.fromCharCode(65 + i)}</span>
                  <span>{opt}</span>
                </div>
              </button>
            ))}
          </div>
          {showAnswer && (
            <div className="mt-4">
              <div className={`rounded-xl p-3 mb-3 text-sm ${selected === q.correct ? 'bg-green-50 text-green-700' : 'bg-amber-50 text-amber-700'}`}>
                {selected === q.correct ? '✅ Chính xác!' : `❌ Đáp án đúng: ${q.opts[q.correct]}`}
              </div>
              <Button onClick={nextQ} className="w-full">
                {currentQ < lesson.quiz.length - 1 ? 'Câu tiếp theo →' : 'Xem kết quả'}
              </Button>
            </div>
          )}
        </div>
      )}

      {finished && (
        <div className="bg-white rounded-2xl shadow-sm border border-rni-100 p-6 text-center fade-in">
          <div className={`w-20 h-20 rounded-full mx-auto mb-3 flex items-center justify-center text-2xl font-bold ${passed ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}`}>
            {passed ? '✅' : '🔄'}
          </div>
          <h3 className="font-bold text-lg mb-1">{passed ? 'Đã vượt qua!' : 'Cần ôn lại'}</h3>
          <p className="text-gray-500 text-sm mb-4">
            {passed ? 'Bài tiếp theo đã được mở khoá!' : 'Xem lại video và thử lại nhé.'}
          </p>
          {passed ? (
            <Button onClick={onBack}>← Quay lại danh sách</Button>
          ) : (
            <Button variant="secondary" onClick={() => { setQuizStarted(false); setCurrentQ(0); setSelected(null); setShowAnswer(false); setScore(0); setFinished(false); }}>
              🔄 Làm lại bài kiểm tra
            </Button>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
function Dashboard({ userName, progress, onSelectLesson, onViewCert }) {
  const completed = LESSONS.filter(l => progress[l.id]).length;
  const allDone = completed === LESSONS.length;

  return (
    <div className="fade-in">
      {/* Header */}
      <div className="bg-white border-b border-rni-100 sticky top-0 z-10">
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">

            <span className="text-lg">🏮</span>

          </div>
          <div className="text-sm font-semibold text-rni-600">{completed}/{LESSONS.length} bài</div>
        </div>
        <div className="max-w-3xl mx-auto px-4 pb-2">
          <ProgressBar value={completed} max={LESSONS.length} />
        </div>
      </div>

      <div className="max-w-3xl mx-auto px-4 py-6">
        {/* Welcome */}
        <div className="mb-6 fade-in">
          <h2 className="font-display text-xl font-bold text-gray-900 mb-1">Xin chào, {userName}! 👋</h2>
          <p className="text-gray-500 text-sm">Tiếp tục hành trình thiết kế cuộc đời của bạn.</p>
        </div>

        {/* All complete banner */}
        {allDone && (
          <div className="bg-rni-600 rounded-2xl p-5 text-white mb-6 flex items-center justify-between flex-wrap gap-3 bounce-in">
            <div>
              <h3 className="font-bold text-lg">🎉 Chúc mừng bạn đã hoàn thành!</h3>
              <p className="text-white/80 text-sm">Nhận chứng chỉ và khám phá chương trình chuyên sâu.</p>
            </div>
            <Button variant="gold" onClick={onViewCert}>Xem Chứng Chỉ 🏆</Button>
          </div>
        )}

        {/* Lesson list */}
        <div className="space-y-3">
          {LESSONS.map((lesson, i) => {
            const isComplete = progress[lesson.id];
            const isLocked = i > 0 && !progress[LESSONS[i - 1].id];
            const isCurrent = !isComplete && !isLocked;

            return (
              <button key={lesson.id}
                onClick={() => { if (!isLocked) onSelectLesson(lesson); }}
                disabled={isLocked}
                className={`w-full bg-white rounded-xl border-2 p-4 text-left transition-all ${
                  isLocked ? 'opacity-40 cursor-not-allowed border-gray-200'
                  : isComplete ? 'border-green-200 card-hover cursor-pointer'
                  : 'border-rni-200 card-hover cursor-pointer'
                }`}>
                <div className="flex items-center gap-4">
                  <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-xl flex-shrink-0 ${
                    isComplete ? 'bg-green-100' : isLocked ? 'bg-gray-100' : 'bg-rni-50'
                  }`}>
                    {isLocked ? '🔒' : isComplete ? '✅' : lesson.icon}
                  </div>
                  <div className="flex-1 min-w-0">
                    <h3 className={`font-semibold text-sm ${isCurrent ? 'text-rni-600' : 'text-gray-900'}`}>
                      Bài {lesson.id}: {lesson.title}
                    </h3>
                    <p className="text-gray-400 text-xs mt-0.5">⏱ {lesson.duration}</p>
                  </div>
                  <div className="text-gray-300 text-lg flex-shrink-0">
                    {isComplete ? <span className="text-green-500 text-sm font-semibold">Hoàn thành</span> : '→'}
                  </div>
                </div>
              </button>
            );
          })}
        </div>

        {/* Footer */}
        <footer className="mt-10 pb-4 text-center">
          <div className="flex items-center justify-center gap-3 text-xs text-gray-400">
            <span>&copy; Học viện RNI</span>
            <a href="https://www.rni.institute/" target="_blank" rel="noopener" className="hover:text-rni-600">rni.institute</a>
            <a href="https://www.facebook.com/IamRubyNguyen" target="_blank" rel="noopener" className="hover:text-rni-600">Facebook</a>
          </div>
        </footer>
      </div>
    </div>
  );
}

// ============================================================
// MAIN APP
// ============================================================
function App() {
  const [screen, setScreen] = useState('register');
  const [userName, setUserName] = useState('');
  const [activeLesson, setActiveLesson] = useState(null);
  const [progress, setProgress] = useState(() => {
    try { return JSON.parse(localStorage.getItem('rni-progress') || '{}'); } catch { return {}; }
  });

  useEffect(() => { localStorage.setItem('rni-progress', JSON.stringify(progress)); }, [progress]);

  useEffect(() => {
    const saved = localStorage.getItem('rni-user-name');
    if (saved) { setUserName(saved); setScreen('dashboard'); }
  }, []);

  const handleRegister = (name, email) => {
    setUserName(name);
    localStorage.setItem('rni-user-name', name);
    localStorage.setItem('rni-user-email', email);
    setScreen('dashboard');
  };

  const handleCompleteLesson = (lessonId) => {
    setProgress(prev => ({ ...prev, [lessonId]: true }));
  };

  if (screen === 'register') {
    return <RegisterScreen onRegister={handleRegister} />;
  }

  if (screen === 'certificate') {
    return <CertificateScreen userName={userName} onBack={() => setScreen('dashboard')} />;
  }

  if (screen === 'lesson' && activeLesson) {
    return (
      <div className="min-h-screen hero-bg py-6 px-4">
        <LessonView
          lesson={activeLesson}
          onComplete={() => handleCompleteLesson(activeLesson.id)}
          onBack={() => { setActiveLesson(null); setScreen('dashboard'); }}
        />
      </div>
    );
  }

  return (
    <div className="min-h-screen hero-bg">
      <Dashboard
        userName={userName}
        progress={progress}
        onSelectLesson={(l) => { setActiveLesson(l); setScreen('lesson'); }}
        onViewCert={() => setScreen('certificate')}
      />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
